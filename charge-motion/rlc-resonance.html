<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RLCを目で理解する — 共振と無効電力（電力の流れ）</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:#0E1116;color:#E6EDF3;font-family:Inter,system-ui,-apple-system,sans-serif;}
.wrap{max-width:520px;margin:0 auto;padding:16px;}
h1{font-size:16px;font-weight:700;margin:0 0 4px;}
.sub{font-size:12px;color:#8B97A5;line-height:1.55;margin:0 0 12px;}
.seg{display:flex;border:1px solid #3A434F;border-radius:8px;overflow:hidden;background:#0E1116;margin-bottom:10px;}
.seg button{flex:1;min-height:46px;border:none;background:transparent;color:#8B97A5;font-family:ui-monospace,Menlo,monospace;font-size:13px;font-weight:600;cursor:pointer;padding:0 4px;}
.seg button.on{background:#F2A93B;color:#0E1116;}
.panel{background:#161B22;border:1px solid #1B2129;border-radius:12px;padding:8px;margin-bottom:10px;}
canvas{display:block;width:100%;}
.expl{padding:11px 13px;background:#161B22;border-radius:8px;border-left:3px solid #4FE08A;font-size:13px;line-height:1.55;margin-bottom:10px;}
.controls{display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:8px;align-items:center;}
.primary{flex:1;min-height:48px;border:none;border-radius:8px;background:#F2A93B;color:#0E1116;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
.ghost{min-height:48px;padding:0 18px;border:1px solid #3A434F;border-radius:8px;background:#0E1116;color:#8B97A5;font-size:15px;cursor:pointer;font-family:inherit;}
.step{min-width:50px;min-height:46px;border:1px solid #3A434F;border-radius:8px;background:#0E1116;color:#E6EDF3;font-size:20px;cursor:pointer;font-family:inherit;}
.lab{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8B97A5;}
.prm{display:flex;justify-content:space-between;align-items:baseline;}
.val{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#E6EDF3;}
.hide{display:none;}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;width:100%;height:6px;border-radius:3px;background:#3A434F;outline:none;touch-action:none;margin:6px 0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#F2A93B;cursor:pointer;border:3px solid #161B22;}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#F2A93B;cursor:pointer;border:3px solid #161B22;}
</style>
</head>
<body>
<div class="wrap">
  <h1>RLCを目で理解する — 共振と無効電力</h1>
  <p class="sub">瞬時電力 p(t)=v(t)·i(t) を見ます。<b style="color:#F2A93B">橙＝電源が回路へ供給</b>、<b style="color:#56C2E6">青＝回路が電源へ返却（無効電力）</b>。青は「行って帰るだけ・消費されない」電力です。</p>

  <div class="seg">
    <button data-el="R" class="on">抵抗 R</button>
    <button data-el="L">コイル L</button>
    <button data-el="C">コンデンサ C</button>
    <button data-el="RLC">直列 RLC</button>
  </div>

  <div class="panel"><canvas id="cv"></canvas></div>
  <div id="expl" class="expl"></div>

  <div class="controls">
    <div class="row">
      <button id="play" class="primary">▶ 再生</button>
      <button id="reset" class="ghost">⟲</button>
    </div>
    <div id="freqWrap" class="hide">
      <div class="prm"><span class="lab">周波数 f / f₀（1.0 で共振）</span><span class="val" id="fval">1.00</span></div>
      <div class="row"><button class="step" id="fdn">−</button><input id="freq" type="range" min="-0.7" max="0.7" step="0.005" value="0"><button class="step" id="fup">＋</button></div>
    </div>
    <div>
      <div class="prm"><span class="lab">アニメ速度</span><span class="val" id="sval">1.0×</span></div>
      <div class="row"><input id="spd" type="range" min="0.3" max="2.5" step="0.1" value="1"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var C={bg:"#0E1116",panel:"#161B22",grid:"#1B2129",wire:"#3A434F",text:"#E6EDF3",
         muted:"#8B97A5",give:"#F2A93B",back:"#56C2E6",real:"#4FE08A",elec:"#F2A93B",mag:"#56C2E6",ghost:"#586374"};
  var MONO="ui-monospace, SFMono-Regular, Menlo, monospace";
  var $=function(id){return document.getElementById(id);};
  var st={el:"R",playing:false,rIdx:0,spd:1,theta:0};
  var Rrlc=0.4; // series R relative to characteristic impedance (Q=1/Rrlc=2.5)
  var ctx,cv,CH=320;

  function fit(){var w=Math.min(cv.parentNode.clientWidth,504);if(w<10)w=320;var dpr=window.devicePixelRatio||1;
    cv.style.width=w+"px";cv.style.height=(w*CH/360)+"px";cv.width=Math.round(w*dpr);cv.height=Math.round(w*CH/360*dpr);
    ctx.setTransform(cv.width/360,0,0,cv.width/360,0,0);}

  function line(x1,y1,x2,y2,col,lw){ctx.strokeStyle=col;ctx.lineWidth=lw||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  function disc(x,y,r,col,a){ctx.save();ctx.globalAlpha=a==null?1:a;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,6.2832);ctx.fill();ctx.restore();}
  function txt(t,x,y,col,size,weight,align){ctx.save();ctx.fillStyle=col;ctx.font=(weight||400)+" "+size+"px "+MONO;ctx.textAlign=align||"start";ctx.textBaseline="alphabetic";ctx.fillText(t,x,y);ctx.restore();}

  // phase of current relative to voltage, and current amplitude (normalized)
  function model(){
    var r=Math.pow(10,st.rIdx);            // f/f0 for RLC
    if(st.el==="R")  return {phi:0,        I:1, label:"抵抗：v と i は同位相"};
    if(st.el==="L")  return {phi:+Math.PI/2,I:1, label:"コイル：i は v より 90°遅れ"};
    if(st.el==="C")  return {phi:-Math.PI/2,I:1, label:"コンデンサ：i は v より 90°進み"};
    // series RLC, normalized w0=1, Z0=1: X = wL-1/wC = r - 1/r ; Z=hypot(R, X)
    var X=r-1/r, Z=Math.hypot(Rrlc,X), I=Rrlc/Z; // normalize so I=1 at resonance (=V/R scaled)
    return {phi:Math.atan2(X,Rrlc), I:I, label:"直列RLC（f/f₀="+r.toFixed(2)+"）"};
  }

  function draw(){
    var m=model(), phi=m.phi, Iamp=m.I;
    ctx.fillStyle=C.bg;ctx.fillRect(0,0,360,CH);

    // ---------- 1) schematic : energy flow between source and circuit ----------
    var sx=44, ex=300, cy=44;
    // instantaneous v,i,p at the cursor
    var v=Math.sin(st.theta), i=Iamp*Math.sin(st.theta-phi), p=v*i; // p in [-Iamp,Iamp]
    var pN=p/Math.max(Iamp,1e-6); // -1..1
    // wires
    line(sx,22,ex,22,C.wire,2.5); line(sx,66,ex,66,C.wire,2.5); line(sx,22,sx,66,C.wire,2.5); line(ex,22,ex,66,C.wire,2.5);
    // source
    ctx.save();ctx.fillStyle=C.panel;ctx.strokeStyle=C.give;ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,cy,13,0,6.2832);ctx.fill();ctx.stroke();
    ctx.strokeStyle=C.give;ctx.lineWidth=1.7;ctx.beginPath();ctx.moveTo(sx-8,cy);ctx.bezierCurveTo(sx-5,cy-7,sx-3,cy-7,sx,cy);ctx.bezierCurveTo(sx+3,cy+7,sx+5,cy+7,sx+8,cy);ctx.stroke();ctx.restore();
    txt("電源",sx,80,C.muted,9,400,"center");
    // element(s) on the right
    if(st.el==="RLC"){
      // R, L, C boxes along the top wire region
      var bx=210, by=cy;
      // draw as labels in a box
      ctx.fillStyle=C.panel;ctx.strokeStyle=C.wire;ctx.lineWidth=2;ctx.beginPath();ctx.rect(255,30,40,28);ctx.fill();ctx.stroke();
      txt("R",262,48,C.give,11,700);txt("L",274,48,C.mag,11,700);txt("C",286,48,C.elec,11,700);
      txt("R+L+C",275,80,C.muted,9,400,"center");
    } else {
      ctx.fillStyle=C.panel;ctx.strokeStyle=(st.el==="R"?C.give:st.el==="L"?C.mag:C.elec);ctx.lineWidth=2.4;ctx.beginPath();ctx.rect(266,28,30,32);ctx.fill();ctx.stroke();
      txt(st.el,281,49,(st.el==="R"?C.give:st.el==="L"?C.mag:C.elec),14,700,"center");
    }
    // big energy-flow arrow in the middle (direction = sign of p, width = |p|)
    var ax0=120, ax1=224, ay=44, w=2+18*Math.abs(pN);
    var giving=p>=0, col=giving?C.give:C.back;
    ctx.save();ctx.globalAlpha=0.35+0.55*Math.abs(pN);ctx.fillStyle=col;
    var xL=giving?ax0:ax1, xR=giving?ax1:ax0, dir=giving?1:-1;
    ctx.beginPath();
    ctx.moveTo(xL, ay-w/2); ctx.lineTo(xR-dir*14, ay-w/2); ctx.lineTo(xR-dir*14, ay-w); ctx.lineTo(xR, ay); ctx.lineTo(xR-dir*14, ay+w); ctx.lineTo(xR-dir*14, ay+w/2); ctx.lineTo(xL, ay+w/2); ctx.closePath();ctx.fill();ctx.restore();
    txt(giving?"電源 → 回路（供給）":"回路 → 電源（返却＝無効）", 172, 16, col, 10, 700, "center");

    // ---------- 2) the power graph p(t)=v·i ----------
    var gx=14, gW=332, gTop=104, gH=120, mid=gTop+gH/2, amp=gH/2-6;
    txt("瞬時電力 p(t) = v(t) · i(t)", gx, gTop-6, C.muted, 10.5);
    // zero axis + frame
    ctx.strokeStyle=C.grid;ctx.lineWidth=1;ctx.strokeRect(gx,gTop,gW,gH);
    line(gx,mid,gx+gW,gH+0*mid===0?mid:mid,C.grid,1);
    // p filled (orange above zero = supplied, blue below = returned)
    var span=4*Math.PI, k, P=0.5*Iamp*Math.cos(phi);
    for(k=0;k<gW;k+=1){
      var ph=(k/gW)*span, vv=Math.sin(ph), ii=Iamp*Math.sin(ph-phi), pp=vv*ii; // [-Iamp,Iamp]
      var y=mid - (pp/Math.max(Iamp,1e-6))*amp;
      ctx.strokeStyle=pp>=0?C.give:C.back;ctx.globalAlpha=0.55;ctx.beginPath();ctx.moveTo(gx+k,mid);ctx.lineTo(gx+k,y);ctx.stroke();ctx.globalAlpha=1;
    }
    // average line = real power P
    var yP=mid-(P/Math.max(Iamp,1e-6))*amp;
    ctx.save();ctx.strokeStyle=C.real;ctx.setLineDash([5,4]);ctx.lineWidth=1.6;line(gx,yP,gx+gW,yP,C.real,1.6);ctx.setLineDash([]);ctx.restore();
    txt("平均 = 有効電力 P", gx+gW-2, yP-4<gTop+8?gTop+12:yP-4, C.real, 9, 400, "end");
    // v and i thin traces (reference)
    function trace(fn,col){ctx.save();ctx.strokeStyle=col;ctx.globalAlpha=0.8;ctx.lineWidth=1.3;ctx.beginPath();for(k=0;k<=gW;k+=2){var ph=(k/gW)*span;var y=mid-fn(ph)*(amp*0.7);if(k===0)ctx.moveTo(gx+k,y);else ctx.lineTo(gx+k,y);}ctx.stroke();ctx.restore();}
    trace(function(ph){return Math.sin(ph);}, C.ghost);                 // v
    trace(function(ph){return Math.sin(ph-phi);}, st.el==="L"?C.mag:st.el==="C"?C.elec:C.text); // i
    // moving cursor
    var cx=gx+((st.theta%span)/span)*gW;
    ctx.save();ctx.strokeStyle=C.muted;ctx.globalAlpha=0.5;line(cx,gTop,cx,gTop+gH,C.muted,1);ctx.restore();
    // legend
    txt("橙=供給", gx+2, gTop+gH+14, C.give, 9.5);
    txt("青=返却(無効)", gx+58, gTop+gH+14, C.back, 9.5);
    txt("緑=平均(有効)", gx+160, gTop+gH+14, C.real, 9.5);
    txt("灰=v  /  i", gx+258, gTop+gH+14, C.muted, 9.5);

    // ---------- 3) real vs reactive bars ----------
    var by=gTop+gH+30, bw=gW, Pn=Math.abs(Math.cos(phi)), Qn=Math.abs(Math.sin(phi));
    txt("有効 P (cosφ)", gx, by-2, C.real, 9.5);
    ctx.fillStyle=C.grid;ctx.fillRect(gx,by+2,bw,10);ctx.fillStyle=C.real;ctx.fillRect(gx,by+2,bw*Pn,10);
    txt((Pn).toFixed(2), gx+bw-2, by+11, C.text, 9, 400, "end");
    txt("無効 |Q| (sinφ)", gx, by+26, C.back, 9.5);
    ctx.fillStyle=C.grid;ctx.fillRect(gx,by+30,bw,10);ctx.fillStyle=C.back;ctx.fillRect(gx,by+30,bw*Qn,10);
    txt((Qn).toFixed(2), gx+bw-2, by+39, C.text, 9, 400, "end");
    txt("力率 cosφ = "+Pn.toFixed(2), gx, by+58, Pn>0.98?C.real:C.text, 11, 700);
  }

  function updateExpl(){
    var m=model(), el=$("expl"), s, col=C.real;
    if(st.el==="R"){s="抵抗：v と i が同位相なので p は常にプラス（橙のみ）。エネルギーは入りっぱなしで熱に＝すべて有効電力。無効電力は0、力率1。";col=C.real;}
    else if(st.el==="L"){s="コイル：i が90°遅れ、p は橙と青が同じ大きさ。前半で磁界にエネルギーを蓄え、後半でそっくり電源へ返す。平均は0＝純粋な無効電力。";col=C.mag;}
    else if(st.el==="C"){s="コンデンサ：i が90°進み、p は橙と青が同量。電界に蓄えては返すだけ。平均0＝純粋な無効電力（符号はコイルと逆）。";col=C.elec;}
    else {
      var r=Math.pow(10,st.rIdx), atRes=Math.abs(r-1)<0.03;
      if(atRes){s="共振！ コイルの無効電力とコンデンサの無効電力が打ち消し合い、電源から見た青（無効）が消える。p はほぼ橙だけ＝力率1。エネルギーは L↔C の内輪だけで往復し、電源は R の消費分だけ供給。";col=C.real;}
      else if(r<1){s="f<f₀：容量性。Cの無効が勝ち、電流は電圧より進む。青（無効＝返却分）が大きく、電源は無効電力を肩代わりさせられている。";col=C.elec;}
      else {s="f>f₀：誘導性。Lの無効が勝ち、電流は電圧より遅れる。青（無効）が大きい。f₀に近づけると青が縮む。";col=C.mag;}
    }
    el.textContent=s;el.style.borderLeftColor=col;
  }

  var last=null;
  function frame(ts){
    if(last==null)last=ts;var dt=(ts-last)/1000;last=ts;if(dt>0.05)dt=0.05;
    if(st.playing)st.theta+=dt*2*Math.PI*0.35*st.spd;
    draw();updateExpl();
    requestAnimationFrame(frame);
  }

  // controls
  function setActive(el){document.querySelectorAll("[data-el]").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-el")===el);});}
  function setPlay(){$("play").textContent=st.playing?"⏸ 一時停止":"▶ 再生";}
  document.querySelectorAll("[data-el]").forEach(function(b){b.addEventListener("click",function(){st.el=b.getAttribute("data-el");setActive(st.el);$("freqWrap").classList.toggle("hide",st.el!=="RLC");});});
  $("play").addEventListener("click",function(){st.playing=!st.playing;last=null;setPlay();});
  $("reset").addEventListener("click",function(){st.theta=0;});
  $("freq").addEventListener("input",function(e){st.rIdx=parseFloat(e.target.value);$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("fdn").addEventListener("click",function(){st.rIdx=Math.max(st.rIdx-0.02,-0.7);$("freq").value=st.rIdx;$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("fup").addEventListener("click",function(){st.rIdx=Math.min(st.rIdx+0.02,0.7);$("freq").value=st.rIdx;$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("spd").addEventListener("input",function(e){st.spd=parseFloat(e.target.value);$("sval").textContent=st.spd.toFixed(1)+"×";});
  window.addEventListener("resize",fit);

  cv=$("cv");ctx=cv.getContext("2d");fit();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
