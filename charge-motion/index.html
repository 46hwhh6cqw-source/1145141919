<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>電荷の動き：電源投入直後</title>
<style>
:root{color-scheme:dark;--bg:#07111d;--card:#0d1b2a;--ink:#eef6ff;--sub:#9fb3c8;--wire:#8192a8;--on:#ffe173;--e:#65caff;--e0:#5a6f84;--i:#ffb86b;--p:#ff6f91;--n:#75d6ff}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:radial-gradient(820px 520px at 50% -190px,#1c4066,#07111d 58%,#03070d);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;padding:12px}.app{max-width:980px;margin:auto;display:grid;gap:12px}h1{font-size:clamp(22px,5.2vw,34px);line-height:1.08;margin:4px 0 6px;font-weight:950}.lead{margin:0;color:var(--sub);font-size:14px;line-height:1.65}.lead b{color:var(--ink)}.card{background:rgba(13,27,42,.94);border:1px solid rgba(255,255,255,.1);border-radius:22px;overflow:hidden;box-shadow:0 22px 70px rgba(0,0,0,.32)}.stage{display:grid;grid-template-columns:minmax(0,1fr) 270px}.pic{padding:12px}.panel{border-left:1px solid rgba(255,255,255,.09);padding:16px;display:grid;align-content:start;gap:12px;background:rgba(255,255,255,.025)}svg{width:100%;height:auto;display:block;border-radius:17px;background:linear-gradient(180deg,#0b1826,#07111d)}h2{font-size:19px;line-height:1.28;margin:0}.txt{margin:0;color:#c8d7e6;font-size:14px;line-height:1.72}.rule{border:1px solid rgba(255,225,115,.32);background:rgba(255,225,115,.08);border-radius:15px;padding:11px;color:#f8edbd;font-size:13px;line-height:1.58}.rule b{display:block;color:var(--on);margin-bottom:4px}.controls{padding:12px;border-top:1px solid rgba(255,255,255,.09);display:grid;gap:10px;background:rgba(255,255,255,.03)}.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}button{border:1px solid rgba(255,255,255,.13);background:#12263a;color:var(--ink);border-radius:13px;min-height:42px;font-size:14px;font-weight:900}button.main{background:#2c63ff;border-color:#7fa2ff}.srow{display:grid;grid-template-columns:56px 1fr 42px;gap:10px;align-items:center;color:var(--sub);font-size:13px}input{width:100%;accent-color:var(--on)}.legend{display:flex;flex-wrap:wrap;gap:7px;padding:0 12px 13px}.pill{font-size:12px;color:#bdd0e3;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);border-radius:999px;padding:6px 9px}.dot{display:inline-block;width:9px;height:9px;border-radius:999px;margin-right:5px}.note{padding:0 12px 14px;color:#9fb3c8;font-size:12px;line-height:1.65}.note b{color:#eef6ff}@media(max-width:780px){body{padding:8px}.stage{grid-template-columns:1fr}.pic{padding:8px}.panel{border-left:0;border-top:1px solid rgba(255,255,255,.09);padding:13px}.lead{font-size:13px}.btns{grid-template-columns:repeat(2,1fr)}}.wire{fill:none;stroke:var(--wire);stroke-width:18;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#5d7288;stroke-width:5;stroke-linecap:round}.on{fill:none;stroke:var(--on);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow);opacity:0}.electron{fill:var(--e0);opacity:.82}.minus{fill:#07111d;font:bold 12px system-ui;text-anchor:middle;dominant-baseline:middle}.earrow{stroke:var(--e);stroke-width:3;stroke-linecap:round;marker-end:url(#ae);opacity:0}.iarrow{stroke:var(--i);stroke-width:4;stroke-linecap:round;marker-end:url(#ai);opacity:0}.front{fill:none;stroke:var(--on);stroke-width:4;filter:url(#glow);opacity:0}.label{fill:#cddbeb;font:bold 16px system-ui;text-anchor:middle}.small{fill:#a9bbce;font:bold 13px system-ui;text-anchor:middle}.part{fill:#182c42;stroke:#8da7c2;stroke-width:3}.res{fill:#2c2119;stroke:#ffb86b;stroke-width:3}.battery{fill:#132942;stroke:#6f8aa3;stroke-width:2}.contact{fill:var(--on)}.surfP{fill:var(--p);opacity:0}.surfN{fill:var(--n);opacity:0}.heat{fill:#ffb86b;opacity:0;filter:url(#glow)}[data-step="1"] .f1,[data-step="2"] .f1,[data-step="2"] .f2,[data-step="3"] .f1,[data-step="3"] .f2,[data-step="3"] .f3,[data-step="4"] .f1,[data-step="4"] .f2,[data-step="4"] .f3,[data-step="4"] .f4{opacity:1}[data-step="1"] .front1,[data-step="2"] .front2,[data-step="3"] .front3{opacity:1}[data-step="2"] .e2,[data-step="3"] .e2,[data-step="3"] .e3,[data-step="4"] .e2,[data-step="4"] .e3,[data-step="4"] .e4{fill:var(--e);filter:url(#eglow)}[data-step="2"] .ea2,[data-step="3"] .ea2,[data-step="3"] .ea3,[data-step="4"] .ea2,[data-step="4"] .ea3,[data-step="4"] .ea4{opacity:.9}[data-step="4"] .ia{opacity:.85}[data-step="1"] .surfP,[data-step="1"] .surfN,[data-step="2"] .surfP,[data-step="2"] .surfN,[data-step="3"] .surfP,[data-step="3"] .surfN,[data-step="4"] .surfP,[data-step="4"] .surfN{opacity:.75}[data-step="3"] .heat,[data-step="4"] .heat{opacity:.22}
</style>
</head>
<body data-step="0">
<main class="app">
<header><h1>電源を入れた瞬間、電荷はどこから動くか</h1><p class="lead"><b>結論：</b>電子は電源から順番に出てくるのではなく、導線中に最初からいる電子が、電界の変化を受け取った場所から少しずつ動き始めます。</p></header>
<section class="card"><div class="stage"><div class="pic">
<svg viewBox="0 0 1280 720" role="img" aria-label="電荷の動きの段階表示">
<defs><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="eglow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="ae" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 10,5 0,10z" fill="#65caff"/></marker><marker id="ai" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 10,5 0,10z" fill="#ffb86b"/></marker></defs>
<rect x="50" y="52" width="1180" height="600" rx="30" fill="#081522"/><rect x="76" y="82" width="1128" height="540" rx="24" fill="rgba(255,255,255,.035)"/>
<path class="wire" d="M185 240H375"/><path class="wire" d="M425 240H920V500H185V455"/><path class="wire" d="M185 285V240"/>
<path class="on f1" d="M185 240H425"/><path class="on f2" d="M425 240H920"/><path class="on f3" d="M920 240V500"/><path class="on f4" d="M920 500H185"/>
<rect class="battery" x="115" y="285" width="140" height="170" rx="20"/><rect x="157" y="260" width="56" height="34" rx="8" fill="#ff6f91"/><rect x="157" y="446" width="56" height="34" rx="8" fill="#75d6ff"/><text x="185" y="335" fill="#eef6ff" font-size="34" font-weight="900" text-anchor="middle">+</text><text x="185" y="420" fill="#eef6ff" font-size="34" font-weight="900" text-anchor="middle">−</text><text x="185" y="520" class="label">電源</text>
<line x1="375" y1="240" x2="421" y2="206" stroke="#ffe173" stroke-width="9" stroke-linecap="round"/><line class="f1" x1="375" y1="240" x2="425" y2="240" stroke="#ffe173" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/><circle class="contact" cx="375" cy="240" r="9"/><circle class="contact" cx="425" cy="240" r="9"/>
<circle class="heat" cx="920" cy="370" r="95"/><rect class="res" x="860" y="326" width="120" height="88" rx="18"/><text x="920" y="382" fill="#eef6ff" font-size="26" font-weight="900" text-anchor="middle">R</text><text x="920" y="435" class="small">抵抗</text>
<text x="565" y="145" class="label">自由電子は最初から導線全体にいる</text><text x="640" y="598" class="small">水色：電子のドリフト　橙：慣用電流　黄色：電界の変化</text>
<circle class="surfP" cx="285" cy="215" r="5"/><circle class="surfN" cx="335" cy="215" r="5"/><circle class="surfP" cx="485" cy="215" r="5"/><circle class="surfN" cx="555" cy="215" r="5"/><circle class="surfP" cx="680" cy="215" r="5"/><circle class="surfN" cx="800" cy="215" r="5"/><circle class="surfN" cx="325" cy="525" r="5"/><circle class="surfP" cx="430" cy="525" r="5"/><circle class="surfN" cx="560" cy="525" r="5"/><circle class="surfP" cx="710" cy="525" r="5"/>
<circle class="front front1" cx="425" cy="240" r="28"/><circle class="front front2" cx="735" cy="240" r="28"/><circle class="front front3" cx="920" cy="370" r="30"/>
<g id="electrons">
<circle class="electron e2" cx="245" cy="240" r="8"/><text class="minus" x="245" y="240">−</text><circle class="electron e2" cx="315" cy="240" r="8"/><text class="minus" x="315" y="240">−</text><circle class="electron e2" cx="495" cy="240" r="8"/><text class="minus" x="495" y="240">−</text><circle class="electron e2" cx="585" cy="240" r="8"/><text class="minus" x="585" y="240">−</text><circle class="electron e2" cx="690" cy="240" r="8"/><text class="minus" x="690" y="240">−</text><circle class="electron e3" cx="820" cy="240" r="8"/><text class="minus" x="820" y="240">−</text><circle class="electron e3" cx="920" cy="300" r="8"/><text class="minus" x="920" y="300">−</text><circle class="electron e3" cx="920" cy="395" r="8"/><text class="minus" x="920" y="395">−</text><circle class="electron e4" cx="830" cy="500" r="8"/><text class="minus" x="830" y="500">−</text><circle class="electron e4" cx="705" cy="500" r="8"/><text class="minus" x="705" y="500">−</text><circle class="electron e4" cx="565" cy="500" r="8"/><text class="minus" x="565" y="500">−</text><circle class="electron e4" cx="420" cy="500" r="8"/><text class="minus" x="420" y="500">−</text><circle class="electron e4" cx="285" cy="500" r="8"/><text class="minus" x="285" y="500">−</text></g>
<line class="earrow ea2" x1="570" y1="265" x2="530" y2="265"/><line class="earrow ea2" x1="690" y1="265" x2="650" y2="265"/><line class="earrow ea3" x1="940" y1="405" x2="940" y2="365"/><line class="earrow ea4" x1="510" y1="525" x2="550" y2="525"/><line class="earrow ea4" x1="360" y1="525" x2="400" y2="525"/>
<line class="iarrow ia" x1="520" y1="215" x2="570" y2="215"/><line class="iarrow ia" x1="890" y1="290" x2="890" y2="340"/><line class="iarrow ia" x1="610" y1="475" x2="560" y2="475"/>
</svg></div><aside class="panel"><h2 id="ttl"></h2><p class="txt" id="txt"></p><div class="rule"><b>見間違えない点</b><span id="rule"></span></div></aside></div>
<div class="controls"><div class="btns"><button id="back">戻る</button><button id="play" class="main">再生</button><button id="next">次へ</button><button id="reset">最初</button></div><div class="srow"><span>段階</span><input id="slider" type="range" min="0" max="4" value="0"><span id="num">0</span></div></div>
<div class="legend"><span class="pill"><span class="dot" style="background:var(--e)"></span>自由電子</span><span class="pill"><span class="dot" style="background:var(--on)"></span>電界の変化が届いた範囲</span><span class="pill"><span class="dot" style="background:var(--i)"></span>慣用電流</span><span class="pill"><span class="dot" style="background:var(--p)"></span>表面電荷の偏り</span></div><div class="note"><b>教材モデル：</b>実際の電子の平均移動は非常に遅く、移動量も小さいです。この画面では「どこにいた電子が、いつ動き始めるか」だけを誇張しています。</div></section></main>
<script>
const steps=[['0. 閉じる前','導線中には自由電子が最初から大量にあります。ただし、回路が開いているので、全体としての持続的なドリフトはありません。','「電荷が無い導線に、電源から電子が入ってくる」ではありません。'],['1. スイッチを閉じる','接点がつながると、電池・導線・表面電荷の配置が変わり始めます。この変化は導線に沿って速く伝わります。','最初に速く進む主役は、電子そのものではなく電界の変化です。'],['2. 届いた場所の電子が動き始める','電界の変化が届いた場所では、そこに元からいた自由電子が少しだけドリフトし始めます。未到達の場所はまだほぼ元の状態です。','電子はバケツリレーのように、その場所その場所で動き出します。'],['3. 抵抗にも条件が届く','抵抗に電界ができると、抵抗内部の電荷も動き、電気エネルギーが熱として消費されます。遠くの電子が一気に到着したから光る、という見方ではありません。','抵抗を働かせるのは、回路全体に成立した電界と電流です。'],['4. 定常状態','十分短い時間の後、回路全体で電流がそろいます。電子はゆっくりドリフトし続けます。慣用電流は電子の向きと逆です。','速いのは信号・電界の成立。電子の平均移動は遅い。']];
let s=0,timer=null;const body=document.body,ttl=document.getElementById('ttl'),txt=document.getElementById('txt'),rule=document.getElementById('rule'),slider=document.getElementById('slider'),num=document.getElementById('num'),play=document.getElementById('play');function show(n){s=Math.max(0,Math.min(4,n));body.dataset.step=s;ttl.textContent=steps[s][0];txt.textContent=steps[s][1];rule.textContent=steps[s][2];slider.value=s;num.textContent=s}function stop(){clearInterval(timer);timer=null;play.textContent='再生'}document.getElementById('next').onclick=()=>{stop();show(s+1)};document.getElementById('back').onclick=()=>{stop();show(s-1)};document.getElementById('reset').onclick=()=>{stop();show(0)};slider.oninput=e=>{stop();show(+e.target.value)};play.onclick=()=>{if(timer){stop();return}play.textContent='停止';timer=setInterval(()=>{if(s>=4){stop();return}show(s+1)},1200)};show(0);
</script>
</body></html>
