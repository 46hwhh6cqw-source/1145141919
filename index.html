<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：教材用完成図</title>
<style>
:root{color-scheme:dark;--bg:#07111c;--card:#0a1b2b;--ink:#eef8ff;--sub:#abc0d1;--wire:#9bb6cc;--dim:#33495d;--yellow:#ffd166;--blue:#61b4ff;--cyan:#66e5ff;--purple:#caa0ff;--green:#78efc4;--red:#ff6b8a;--orange:#ff9f6e}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(900px 540px at 50% -170px,#1e4265,#07111c 58%,#02060b);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}body{overflow-y:auto;-webkit-overflow-scrolling:touch}.app{max-width:1180px;margin:0 auto;padding:8px 8px 28px}.top{position:sticky;top:0;z-index:10;background:linear-gradient(#07111c 76%,rgba(7,17,28,.78));backdrop-filter:blur(8px);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0 8px}h1{margin:0;font-size:clamp(18px,4.6vw,31px);line-height:1.05}.sub{margin:4px 0 0;color:var(--sub);font-size:12px}.ctl{display:flex;gap:6px}button{border:1px solid #365772;border-radius:12px;background:#0c1d2e;color:#e9f7ff;min-height:38px;padding:9px 10px;font-size:13px;font-weight:900;cursor:pointer;white-space:nowrap}.primary{background:#1b6dff;border-color:#6ba6ff}.onBtn{background:#0f342f;border-color:#67e0bf;color:#ddfff5}.grid{display:grid;grid-template-columns:minmax(0,1.42fr) minmax(310px,.86fr);gap:9px}.card{background:rgba(6,18,30,.94);border:1px solid #284158;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}.fig svg{width:100%;height:auto;display:block}.side{padding:12px;display:grid;gap:10px;align-content:start}.dots{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dot{height:8px;min-height:8px;border:0;border-radius:999px;background:#173046;padding:0}.dot.sel{background:linear-gradient(90deg,var(--green),var(--blue),var(--yellow))}.title{margin:0;font-size:20px;line-height:1.25}.lead{margin:0;color:#d7e6f2;line-height:1.62;font-size:14px}.box{background:#071827;border:1px solid #31536d;border-radius:14px;padding:9px}.box b{display:block;color:#9fd1ff;font-size:12px;margin-bottom:5px}.box p{margin:0;color:#b9cada;font-size:13px;line-height:1.55}.formula{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--yellow);font-weight:950;font-size:18px}.legend{display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:#9eb0c0}.pill{background:#081929;border:1px solid #33516a;border-radius:999px;padding:4px 7px}details{background:#061624;border:1px solid #263e55;border-radius:14px;padding:9px;color:#b8c9d7;font-size:12px;line-height:1.5}summary{cursor:pointer;font-weight:900;color:#d9efff}.bg{fill:#081522;stroke:#28465f}.wire{fill:none;stroke:var(--wire);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.wireThin{fill:none;stroke:#6f8aa1;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.bus{fill:none;stroke:#7b95aa;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#55738e;stroke-width:3}.rx{fill:#302117;stroke:var(--orange)}.r{fill:#391b27;stroke:var(--red)}.rs{fill:#172d22;stroke:var(--green)}.aux{fill:#102d39;stroke:var(--cyan)}.src{fill:#102437;stroke:#98c8ff;stroke-width:4}.gal{fill:#1c1230;stroke:var(--purple);stroke-width:4}.node{fill:#e4f4ff;stroke:#07111b;stroke-width:4}.lbl{fill:#f6fbff;font:950 25px ui-monospace,SFMono-Regular,Menlo,monospace}.lblS{font-size:18px}.jp{fill:#bed1e1;font-size:14px;font-weight:850}.tiny{fill:#97aebe;font-size:12px;font-weight:750}.vtx{fill:#e9f6ff;font-size:13px;font-weight:900}.callText{fill:#e8f6ff;font-size:14px;font-weight:850}.call{fill:#06131f;stroke:#31516a;stroke-width:2}.path{fill:none;stroke:var(--yellow);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:0;marker-end:url(#arrowY)}.path.show{opacity:1;filter:url(#glow)}.pBlue{stroke:var(--blue);marker-end:url(#arrowB)}.pCyan{stroke:var(--cyan);marker-end:url(#arrowC)}.pPurple{stroke:var(--purple);marker-end:url(#arrowP)}.pGray{stroke:#a5adb6;stroke-width:6;stroke-dasharray:10 10;marker-end:url(#arrowG)}.drop{fill:none;stroke:var(--yellow);stroke-width:6;stroke-linecap:round;stroke-dasharray:10 10;opacity:0}.drop.show{opacity:.88}.fade{opacity:.28}.hi{filter:url(#glow)}.hide{opacity:0}.showBox{opacity:1}.rail{stroke:#3a5872;stroke-width:7;stroke-linecap:round}.vm{fill:var(--yellow);stroke:#06111b;stroke-width:4}.vn{fill:var(--cyan);stroke:#06111b;stroke-width:4}.safe{fill:#d7fff4;font-weight:950}.warn{fill:#ffdde5;font-weight:950}@media(max-width:860px){.app{padding:7px 7px 30px}.top{grid-template-columns:1fr}.ctl{display:grid;grid-template-columns:1fr 1fr 1fr}.ctl button{padding:8px 6px;font-size:12px}.grid{display:block}.fig{height:60svh;margin-bottom:8px}.fig svg{height:100%;width:100%}.side{margin-top:8px}.title{font-size:17px}.lead{font-size:13px;line-height:1.52}.box p{font-size:12px}.legend{display:none}.sub{font-size:11px}.dot{height:7px;min-height:7px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
  <div><h1>ケルビンダブルブリッジ</h1><p class="sub">教材用：文字被りを避け、電流は矢印で一方向だけ示す。</p></div>
  <div class="ctl"><button id="back">戻る</button><button id="play" class="onBtn">自動 ON</button><button id="next" class="primary">次へ</button></div>
</header>
<section class="grid">
<div class="card fig">
<svg viewBox="0 0 900 560" aria-label="ケルビンダブルブリッジ教材図">
<defs>
<filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<marker id="arrowY" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ffd166"/></marker>
<marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#61b4ff"/></marker>
<marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#66e5ff"/></marker>
<marker id="arrowP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#caa0ff"/></marker>
<marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a5adb6"/></marker>
</defs>
<rect x="14" y="14" width="872" height="532" rx="26" class="bg"/>
<text x="82" y="54" class="jp">A 高電位</text><text x="716" y="54" class="jp">D 低電位</text>
<path d="M120 370 V135 H205" class="bus" data-g="all source top"/><path d="M760 370 V135 H690" class="bus" data-g="all source top"/>
<circle cx="120" cy="370" r="8" class="node"/><circle cx="760" cy="370" r="8" class="node"/><text x="99" y="400" class="vtx">A=100</text><text x="738" y="400" class="vtx">D=0</text>
<circle cx="105" cy="468" r="32" class="src" data-g="source"/><text x="105" y="477" text-anchor="middle" class="lbl">E</text><text x="42" y="518" class="tiny">電源内部だけ D → A</text>
<path d="M760 370 V468 H138 V370 H120" class="wireThin" stroke="#a5adb6" data-g="source"/>
<g data-g="main result"><path d="M120 370 H268" class="wire"/><rect x="268" y="341" width="116" height="58" rx="14" class="part rx"/><text x="326" y="379" text-anchor="middle" class="lbl">Rx</text><path d="M384 370 H435" class="wire"/><circle cx="435" cy="370" r="8" class="node"/><text x="414" y="402" class="vtx">B=70</text><rect x="470" y="341" width="86" height="58" rx="14" class="part r"/><text x="513" y="379" text-anchor="middle" class="lbl">r</text><path d="M556 370 H590" class="wire"/><circle cx="590" cy="370" r="8" class="node"/><text x="570" y="402" class="vtx">C=30</text><rect x="625" y="341" width="115" height="58" rx="14" class="part rs"/><text x="683" y="379" text-anchor="middle" class="lbl">Rs</text><path d="M740 370 H760" class="wire"/><text x="294" y="424" class="tiny">未知抵抗</text><text x="477" y="424" class="tiny">接続抵抗</text><text x="654" y="424" class="tiny">標準抵抗</text></g>
<g data-g="aux balance result"><path d="M435 370 V270 H465" class="wire" stroke="#66e5ff"/><rect x="465" y="241" width="66" height="56" rx="13" class="part aux"/><text x="498" y="278" text-anchor="middle" class="lbl lblS">p</text><path d="M531 270 H560" class="wire" stroke="#66e5ff"/><circle cx="560" cy="270" r="8" class="node"/><text x="548" y="254" class="vtx">N</text><path d="M560 270 H590" class="wire" stroke="#66e5ff"/><rect x="590" y="241" width="66" height="56" rx="13" class="part aux"/><text x="623" y="278" text-anchor="middle" class="lbl lblS">q</text><path d="M656 270 H685 V370 H590" class="wire" stroke="#66e5ff"/><text x="464" y="225" class="jp">p,q: B → C</text></g>
<g data-g="top balance result"><path d="M205 135 H240" class="wire"/><rect x="240" y="106" width="90" height="58" rx="14" class="part"/><text x="285" y="144" text-anchor="middle" class="lbl">P</text><path d="M330 135 H410" class="wire"/><circle cx="410" cy="135" r="8" class="node"/><text x="396" y="120" class="vtx">M</text><path d="M410 135 H505" class="wire"/><rect x="505" y="106" width="90" height="58" rx="14" class="part"/><text x="550" y="144" text-anchor="middle" class="lbl">Q</text><path d="M595 135 H690" class="wire"/><text x="296" y="88" class="jp">P,Q: A → D</text></g>
<g data-g="gal balance result"><path d="M410 135 C455 180 505 225 560 270" class="wire" stroke="#caa0ff"/><circle cx="486" cy="205" r="29" class="gal"/><text x="486" y="214" text-anchor="middle" class="lbl">G</text></g>
<path id="pathMain" d="M120 370 H268 H384 H435 H470 H556 H590 H625 H740 H760" class="path"/>
<path id="pathTop" d="M120 370 V135 H240 H330 H410 H505 H595 H760 V370" class="path pBlue"/>
<path id="pathAux" d="M435 370 V270 H465 H531 H560 H590 H656 H685 V370 H590" class="path pCyan"/>
<path id="pathGal" d="M560 270 C505 225 455 180 410 135" class="path pPurple"/>
<path id="pathSrc" d="M760 370 V468 H138 V370 H120" class="path pGray"/>
<path id="dropRx" d="M326 329 V286" class="drop"/><path id="dropR" d="M513 329 V286" class="drop"/><path id="dropRs" d="M683 329 V286" class="drop"/>
<g data-g="voltage"><line x1="810" y1="90" x2="810" y2="455" class="rail"/><text x="780" y="83" class="vtx">100</text><text x="792" y="485" class="vtx">0</text><circle id="markM" cx="810" cy="272" r="10" class="vm"/><text id="textM" x="827" y="277" class="vtx">M=50</text><circle id="markN" cx="810" cy="272" r="10" class="vn"/><text id="textN" x="827" y="295" class="vtx">N=50</text><text x="744" y="528" class="tiny">電圧の高さ</text></g>
<g><rect x="45" y="75" width="250" height="72" rx="15" class="call"/><text id="msg1" x="170" y="104" text-anchor="middle" class="callText">外部回路は A → D</text><text id="msg2" x="170" y="132" text-anchor="middle" class="callText">戻りは電源内部だけ</text></g>
<g id="resultBox" class="hide"><rect x="585" y="76" width="252" height="72" rx="15" fill="#17283d" stroke="#ffd166"/><text x="711" y="104" text-anchor="middle" class="tiny">平衡後</text><text x="711" y="135" text-anchor="middle" class="lbl lblS" fill="#ffd166">Rx = Rs × P/Q</text></g>
</svg>
</div>
<aside class="card side">
  <div class="dots" id="dots"></div>
  <h2 class="title" id="title"></h2>
  <p class="lead" id="lead"></p>
  <div class="box"><b>このステップで見るもの</b><p id="focus"></p></div>
  <div class="box"><b>電圧</b><p><span class="formula" id="volt"></span></p></div>
  <p class="lead" id="note"></p>
  <div class="legend"><span class="pill">黄: 主電流</span><span class="pill">青: P,Q</span><span class="pill">水: p,q</span><span class="pill">紫: G</span></div>
  <details><summary>設計上の約束</summary><p>図中の電流は矢印で一方向だけ示す。動く粒は使わない。文字は部品名と節点名に絞り、説明はカード側へ分離。</p></details>
</aside>
</section>
</main>
<script>
const steps=[
{g:'source',title:'1. 電源と外部回路を分ける',lead:'外部の測定回路では電流は A から D へ進む。D から A へ戻すのは電源内部だけ。',focus:'灰色の点線は電源内部の戻り。測定枝で逆戻りする電流は描かない。',volt:'A=100, D=0',note:'ここで「現実に閉じた回路」になる。',paths:['pathSrc'],m:50,n:50,msg:['外部回路は A → D','戻りは電源内部だけ']},
{g:'main',title:'2. 主電流を追う',lead:'主電流は A → Rx → B → r → C → Rs → D と一方向に流れる。',focus:'Rx、r、Rs それぞれで電圧が下がる。r の電圧降下が低抵抗測定の邪魔になる。',volt:'A=100 → B=70 → C=30 → D=0',note:'黄色の矢印だけを見る。',paths:['pathMain'],drops:['dropRx','dropR','dropRs'],m:50,n:50,msg:['主電流: A → D','Rx, r, Rs で電圧降下']},
{g:'aux',title:'3. 補助腕 p,q を追う',lead:'p,q は r の両端 B,C をまたぐ補助枝。電流は B → p → N → q → C と流れる。',focus:'p,q は r を消す部品ではなく、r の電圧降下の途中に N という点を作る。',volt:'B=70 → N=50 → C=30',note:'水色の矢印だけを見る。C からBへ戻る線はない。',paths:['pathMain','pathAux'],drops:['dropR'],m:50,n:50,msg:['p,q: B → C','N は r の途中電位']},
{g:'top',title:'4. 比較腕 P,Q を追う',lead:'P,Q は A と D の間の比較枝。電流は A → P → M → Q → D と流れる。',focus:'P,Q が比較点 M を作る。p,q が作る N と比較する。',volt:'A=100 → M=50 → D=0',note:'青い矢印を見る。',paths:['pathMain','pathAux','pathTop'],m:50,n:50,msg:['P,Q: A → D','M と N を比べる']},
{g:'gal',title:'5. 未平衡なら G に流れる',lead:'例として N が M より高いと、検流計 G には N → M の向きに電流が流れる。',focus:'G の電流は「未平衡を知らせる電流」。測定値としてはまだ使わない。',volt:'V_M=50, V_N=58',note:'紫の矢印は例示。平衡したら消える。',paths:['pathMain','pathAux','pathTop','pathGal'],m:50,n:58,msg:['V_M ≠ V_N','I_G ≠ 0']},
{g:'balance',title:'6. 平衡では M と N が同じ高さ',lead:'調整して V_M と V_N が一致すると、G の両端に電圧差がなくなり、G の電流が止まる。',focus:'G=0 は「M と N が同じ電位」の合図。',volt:'V_M = V_N = 50',note:'ここがブリッジの読み取り点。',paths:['pathMain','pathAux','pathTop'],m:50,n:50,msg:['V_M = V_N','I_G = 0']},
{g:'result',title:'7. 最後に式で読む',lead:'P/Q と p/q をそろえて平衡させると、r の影響が比較から外れる。',focus:'残る関係は未知抵抗 Rx と標準抵抗 Rs の比。',volt:'Rx = Rs × P/Q',note:'式は最後。主役は M と N の電圧合わせ。',paths:['pathMain','pathAux','pathTop'],m:50,n:50,msg:['P/Q = p/q','r の影響を外す'],result:true}
];
let idx=0,playing=true,timer=null;const $=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));
steps.forEach((_,i)=>{const b=document.createElement('button');b.className='dot';b.onclick=()=>{idx=i;render();reset()};$('#dots').appendChild(b)});
function y(v){return 455-v*3.65}
function render(){const s=steps[idx];$('#title').textContent=s.title;$('#lead').textContent=s.lead;$('#focus').textContent=s.focus;$('#volt').textContent=s.volt;$('#note').textContent=s.note;$('#msg1').textContent=s.msg[0];$('#msg2').textContent=s.msg[1];$('#markM').setAttribute('cy',y(s.m));$('#markN').setAttribute('cy',y(s.n));$('#textM').setAttribute('y',y(s.m)+5);$('#textN').setAttribute('y',y(s.n)+23);$('#textM').textContent='M='+s.m;$('#textN').textContent='N='+s.n;$$('.dot').forEach((d,i)=>d.classList.toggle('sel',i===idx));$$('[data-g]').forEach(el=>{const list=(el.dataset.g||'').split(' ');const active=list.includes(s.g)||list.includes('all')||list.includes('voltage');el.classList.toggle('fade',!active);el.classList.toggle('hi',active)});$$('.path').forEach(p=>p.classList.remove('show'));(s.paths||[]).forEach(id=>$('#'+id).classList.add('show'));$$('.drop').forEach(p=>p.classList.remove('show'));(s.drops||[]).forEach(id=>$('#'+id).classList.add('show'));$('#resultBox').setAttribute('class',s.result?'showBox':'hide');$('#play').textContent=playing?'自動 ON':'自動 OFF';$('#play').className=playing?'onBtn':''}
function reset(){if(timer)clearInterval(timer);if(playing)timer=setInterval(()=>{idx=(idx+1)%steps.length;render()},5200)}
$('#play').onclick=()=>{playing=!playing;render();reset()};$('#back').onclick=()=>{idx=(idx+steps.length-1)%steps.length;render();reset()};$('#next').onclick=()=>{idx=(idx+1)%steps.length;render();reset()};render();reset();
</script>
</body>
</html>
