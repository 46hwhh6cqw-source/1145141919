<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：正しい電流経路</title>
<style>
:root{color-scheme:dark;--bg:#03070c;--panel:#071421;--card:#0b1826;--wire:#6e8ca8;--dim:#263b50;--txt:#eef8ff;--sub:#a8bacb;--main:#ffd166;--top:#58a8ff;--aux:#66e5ff;--gal:#c99cff;--ok:#78efc4;--bad:#ff6b8a;--rx:#ff9f6e}*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:radial-gradient(900px 520px at 50% -160px,#1f4568,#07111c 58%,#03060b);color:var(--txt);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}.app{height:100dvh;display:flex;flex-direction:column;gap:8px;padding:8px;max-width:1180px;margin:0 auto}.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}h1{font-size:clamp(18px,4.6vw,30px);line-height:1.05;margin:0}.sub{font-size:12px;color:var(--sub);margin:4px 0 0}.ctrl{display:flex;gap:6px;align-items:center;justify-content:flex-end}button{border:1px solid #31516d;border-radius:12px;background:#0b1b2b;color:#e8f6ff;padding:9px 10px;font-weight:900;min-height:38px;font-size:13px;cursor:pointer;white-space:nowrap}.primary{background:#1c6dff;border-color:#6aa5ff}.autoOn{background:#0d2d2a;border-color:#62e0be;color:#dcfff6}.stage{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1.43fr) minmax(300px,.82fr);gap:9px}.card{background:rgba(7,17,28,.9);border:1px solid #243d55;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}.fig{min-height:0;display:flex}.fig svg{width:100%;height:100%;display:block}.side{padding:12px;display:grid;grid-template-rows:auto auto auto 1fr;gap:9px;min-height:0}.stepbar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dot{height:8px;border-radius:99px;background:#183047;border:0;min-height:8px;padding:0}.dot.on{background:linear-gradient(90deg,var(--ok),var(--top),var(--main))}.stepTitle{margin:0;font-size:20px;line-height:1.25}.lead{margin:0;color:#d7e6f2;line-height:1.58;font-size:14px}.meters{display:grid;grid-template-columns:1fr 1fr;gap:7px}.meterBox{background:#071827;border:1px solid #2d4c66;border-radius:14px;padding:8px}.meterBox b{display:block;font-size:11px;color:#91caff;margin-bottom:4px}.meterBox .v{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px;font-weight:950;color:var(--main)}.meterBox .m{font-size:11px;color:#aebfce;line-height:1.35;margin-top:2px}.note{font-size:13px;color:#b8c9d8;line-height:1.58;margin:0;overflow:auto;padding-right:2px}.legend{display:flex;gap:6px;flex-wrap:wrap;color:#94aabc;font-size:11px}.pill{border:1px solid #2e4b64;border-radius:999px;padding:4px 7px;background:#081929}.bg{fill:#081522;stroke:#244056}.wire{fill:none;stroke:var(--wire);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#496982;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#4a6988;stroke-width:3}.rx{fill:#2d1f18;stroke:var(--rx)}.rr{fill:#3a1b27;stroke:var(--bad)}.rs{fill:#182c22;stroke:var(--ok)}.aux{fill:#102d39;stroke:var(--aux)}.source{fill:#102437;stroke:#90c3ff;stroke-width:4}.meterG{fill:#1b1230;stroke:var(--gal);stroke-width:4}.node{fill:#e1f3ff;stroke:#07111b;stroke-width:4}.label{fill:#f5fbff;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:27px}.labelS{font-size:20px}.jp{fill:#b9cada;font-weight:850;font-size:16px}.micro{fill:#94a9bb;font-weight:750;font-size:13px}.vtxt{fill:#e9f6ff;font-weight:900;font-size:14px}.currentPath{fill:none;stroke:var(--main);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.14}.currentPath.on{opacity:.9;filter:url(#glow)}.topPath{stroke:var(--top)}.auxPath{stroke:var(--aux)}.gPath{stroke:var(--gal)}.sourcePath{stroke:#8997a5;stroke-width:5;stroke-dasharray:9 9}.drop{fill:none;stroke:var(--main);stroke-width:6;stroke-dasharray:10 10;stroke-linecap:round;opacity:0}.drop.on{opacity:.85}.dimmed{opacity:.2}.bright{opacity:1;filter:url(#glow)}.hide{opacity:0}.show{opacity:1}.particle{fill:#fff3a8;stroke:#ff9f1c;stroke-width:3;filter:url(#glow)}.pTop{fill:#b8dcff;stroke:#58a8ff}.pAux{fill:#a8f6ff;stroke:#30d4ff}.pG{fill:#e9ceff;stroke:#c99cff}.voltRail{stroke:#36536d;stroke-width:7;stroke-linecap:round}.vpM{fill:var(--main);stroke:#08111c;stroke-width:4}.vpN{fill:var(--aux);stroke:#08111c;stroke-width:4}.callBox{fill:#06101b;stroke:#31516d;stroke-width:2}.callText{fill:#e8f6ff;font-size:14px;font-weight:850}.warn{fill:#ffdde3;font-weight:900;font-size:14px}.ok{fill:#dbfff5;font-weight:900;font-size:14px}@media(max-width:850px){.app{padding:7px;gap:6px}.top{grid-template-columns:1fr}.ctrl{justify-content:stretch}.ctrl button{flex:1;padding:8px 6px;font-size:12px}.stage{grid-template-columns:1fr;grid-template-rows:59dvh 1fr;gap:7px}.side{padding:10px}.stepTitle{font-size:17px}.lead{font-size:13px;line-height:1.46}.meterBox{padding:7px}.meterBox .v{font-size:16px}.note{font-size:12px;line-height:1.46}.legend{display:none}.sub{font-size:11px}.dot{height:7px;min-height:7px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
  <div><h1>ケルビンダブルブリッジ</h1><p class="sub">外部回路の電流は A から D へ。D から A へ戻すのは電源内部だけ。</p></div>
  <div class="ctrl"><button id="back">戻る</button><button id="play" class="autoOn">自動 ON</button><button id="next" class="primary">次へ</button></div>
</header>
<section class="stage">
<div class="card fig">
<svg viewBox="0 0 940 620" aria-label="正しい電流経路のケルビンダブルブリッジ">
<defs><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect x="18" y="18" width="904" height="584" rx="28" class="bg"/>
<text x="92" y="72" class="jp">A 高電位</text><text x="764" y="72" class="jp">D 低電位</text>
<circle cx="110" cy="500" r="35" class="source" data-g="source"/><text x="110" y="509" text-anchor="middle" class="label">E</text><text x="52" y="554" class="micro">電源内部で D → A</text>
<path d="M800 420 V500 H145" class="thin sourcePath" data-g="source"/>
<path d="M145 500 V420 H140" class="thin sourcePath" data-g="source"/>
<path d="M140 420 V190 H210" class="wire" data-g="all source top"/><path d="M800 420 V190 H730" class="wire" data-g="all source top"/>
<circle cx="140" cy="420" r="8" class="node"/><circle cx="800" cy="420" r="8" class="node"/><text x="128" y="448" class="vtxt">A=100</text><text x="774" y="448" class="vtxt">D=0</text>
<g data-g="main result"><path d="M140 420 H300" class="wire"/><rect x="300" y="391" width="118" height="58" rx="14" class="part rx"/><text x="359" y="429" text-anchor="middle" class="label">Rx</text><path d="M418 420 H470" class="wire"/><circle cx="470" cy="420" r="8" class="node"/><text x="448" y="448" class="vtxt">B=70</text><rect x="506" y="391" width="88" height="58" rx="14" class="part rr"/><text x="550" y="429" text-anchor="middle" class="label">r</text><circle cx="630" cy="420" r="8" class="node"/><text x="609" y="448" class="vtxt">C=62</text><path d="M594 420 H630" class="wire"/><rect x="660" y="391" width="118" height="58" rx="14" class="part rs"/><text x="719" y="429" text-anchor="middle" class="label">Rs</text><path d="M778 420 H800" class="wire"/><text x="349" y="472" class="micro">未知抵抗</text><text x="514" y="472" class="micro">接続抵抗</text><text x="688" y="472" class="micro">標準抵抗</text></g>
<g data-g="aux balance result"><path d="M470 420 V310 H500" class="wire" stroke="#66e5ff"/><rect x="500" y="281" width="70" height="58" rx="14" class="part aux"/><text x="535" y="319" text-anchor="middle" class="label labelS">p</text><circle cx="592" cy="310" r="8" class="node"/><text x="578" y="294" class="vtxt">N</text><rect x="615" y="281" width="70" height="58" rx="14" class="part aux"/><text x="650" y="319" text-anchor="middle" class="label labelS">q</text><path d="M685 310 H715 V420 H630" class="wire" stroke="#66e5ff"/><text x="508" y="260" class="jp">p,q は B から C へ</text></g>
<g data-g="top balance result"><path d="M210 190 H250" class="wire"/><rect x="250" y="161" width="95" height="58" rx="14" class="part"/><text x="298" y="199" text-anchor="middle" class="label">P</text><circle cx="430" cy="190" r="8" class="node"/><text x="416" y="174" class="vtxt">M</text><rect x="515" y="161" width="95" height="58" rx="14" class="part"/><text x="563" y="199" text-anchor="middle" class="label">Q</text><path d="M345 190 H515" class="wire"/><path d="M610 190 H730" class="wire"/><text x="318" y="139" class="jp">P,Q は A から D へ</text></g>
<g data-g="gal balance result"><path d="M430 190 C470 230 525 270 592 310" class="wire" stroke="#c99cff"/><circle cx="500" cy="250" r="30" class="meterG"/><text x="500" y="259" text-anchor="middle" class="label">G</text></g>
<path id="mainPath" d="M140 420 H300 H418 H470 H506 H594 H630 H660 H778 H800" class="currentPath"/>
<path id="topPath" d="M140 420 V190 H250 H345 H430 H515 H610 H800 V420" class="currentPath topPath"/>
<path id="auxPath" d="M470 420 V310 H500 H570 H592 H615 H685 H715 V420 H630" class="currentPath auxPath"/>
<path id="gPath" d="M430 190 C470 230 525 270 592 310" class="currentPath gPath"/>
<path id="sourcePath" d="M800 420 V500 H145 V420 H140" class="currentPath sourcePath"/>
<path id="dropRx" d="M358 382 V332" class="drop"/><path id="dropR" d="M550 382 V332" class="drop"/><path id="dropRs" d="M719 382 V332" class="drop"/>
<g data-g="voltage"><line x1="850" y1="120" x2="850" y2="505" class="voltRail"/><text x="818" y="112" class="vtxt">100</text><text x="830" y="535" class="vtxt">0</text><circle id="pM" cx="850" cy="256" r="11" class="vpM"/><text id="txtM" x="868" y="261" class="vtxt">M=66</text><circle id="pN" cx="850" cy="268" r="11" class="vpN"/><text id="txtN" x="868" y="286" class="vtxt">N=63</text><text x="780" y="582" class="micro">電圧の高さ</text></g>
<g id="msgBox"><rect x="60" y="92" width="260" height="72" rx="16" class="callBox"/><text id="msg1" x="190" y="121" text-anchor="middle" class="callText">外部回路は A → D</text><text id="msg2" x="190" y="148" text-anchor="middle" class="callText">D → A は電源内部だけ</text></g>
<g id="resultBox" class="hide"><rect x="590" y="95" width="250" height="72" rx="16" fill="#17283d" stroke="#ffd166"/><text x="715" y="124" text-anchor="middle" class="micro">平衡後</text><text x="715" y="153" text-anchor="middle" class="label labelS" fill="#ffd166">Rx = Rs × P/Q</text></g>
<circle id="dotMain" r="8" class="particle"/><circle id="dotTop" r="7" class="particle pTop"/><circle id="dotAux" r="7" class="particle pAux"/><circle id="dotG" r="7" class="particle pG"/><circle id="dotSrc" r="6" class="particle" fill="#ced6df" stroke="#8c98a4"/>
</svg>
</div>
<aside class="card side">
  <div class="stepbar" id="dots"></div>
  <h2 class="stepTitle" id="title"></h2>
  <p class="lead" id="lead"></p>
  <div class="meters"><div class="meterBox"><b>比較点 M</b><div class="v" id="vm">V_M = 66</div><div class="m" id="vmNote">P,Q が作る電圧</div></div><div class="meterBox"><b>r 側の点 N</b><div class="v" id="vn">V_N = 63</div><div class="m" id="vnNote">p,q が作る電圧</div></div></div>
  <p class="note" id="note"></p>
  <div class="legend"><span class="pill">黄：A→Rx→r→Rs→D</span><span class="pill">青：A→P→Q→D</span><span class="pill">水：B→p→q→C</span><span class="pill">紫：M↔N</span></div>
</aside>
</section>
</main>
<script>
const steps=[
{f:'source',t:'1. 電流は外部回路で A から D へ',lead:'電源は A を高電位、D を低電位にする。外部の測定回路では電流は A から D へ進む。D から A へ戻すのは電源内部だけ。',note:'「来たところへ戻る」ような測定枝は作らない。戻り道は電源の中として別に表示している。',m:66,n:63,msg:['外部回路は A → D','D → A は電源内部だけ'],paths:['sourcePath']},
{f:'main',t:'2. 主電流は Rx, r, Rs を一方向に通る',lead:'主電流は A → Rx → B → r → C → Rs → D。r は B と C の間にあるので、r にも電圧降下が出る。',note:'ここが低抵抗測定で邪魔になる部分。黄色の粒は左から右へ流れ、同じ枝を逆戻りしない。',m:66,n:63,msg:['主電流は A → D','Rx, r, Rs で電圧降下'],paths:['mainPath'],drops:['dropRx','dropR','dropRs']},
{f:'aux',t:'3. p,q の電流は B から C へ流れる',lead:'p,q は r の両端 B,C をまたぐ枝。電流は B → p → N → q → C と流れて、C 側で主枝に合流する。',note:'p,q は閉じた輪ではない。r と並列に、B から C へ通る補助枝として見る。',m:66,n:63,msg:['p,q は B → C','N は r の途中電位'],paths:['mainPath','auxPath'],drops:['dropR']},
{f:'top',t:'4. P,Q の電流は A から D へ流れる',lead:'P,Q も電源につながる別の枝。A → P → M → Q → D と流れ、M という比較用の電位を作る。',note:'M は P,Q で作る電位。N は p,q で作る電位。この2つを比べる。',m:66,n:63,msg:['P,Q は A → D','M と N を比べる'],paths:['mainPath','topPath','auxPath']},
{f:'gal',t:'5. M と N がずれると G に電流が流れる',lead:'M と N の電位が違うと、検流計 G に電圧がかかる。だから紫の電流が M から N へ流れる。',note:'これは未平衡。G に電流が流れるので、まだ測定値として使わない。',m:66,n:63,msg:['V_M ≠ V_N','G に電流が流れる'],paths:['mainPath','topPath','auxPath','gPath']},
{f:'balance',t:'6. 調整して M と N を同じ高さにする',lead:'p,q と P,Q の比をそろえると、N の高さと M の高さを一致させられる。すると G の両端に電圧差がなくなる。',note:'平衡状態では G に電流が流れない。ここで初めて比較が成立する。',m:66,n:66,msg:['V_M = V_N','G 電流は 0'],paths:['mainPath','topPath','auxPath']},
{f:'result',t:'7. 最後に r の影響が比較から外れる',lead:'r の電圧降下を p,q で同じ割合に分けて見ているので、平衡条件から r の影響だけが外れる。最後に Rx と Rs の関係が残る。',note:'結論だけ式で読む。主役はあくまで M と N の電圧合わせ。',m:66,n:66,msg:['P/Q = p/q','Rx = Rs × P/Q'],paths:['mainPath','topPath','auxPath'],result:true}
];
let step=0,playing=true,last=0,timer=0;const D=5600;const $=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));const dots=$('#dots');steps.forEach((_,i)=>{const b=document.createElement('button');b.className='dot';b.onclick=()=>{step=i;timer=0;render()};dots.appendChild(b)});
function render(){const s=steps[step];$('#title').textContent=s.t;$('#lead').textContent=s.lead;$('#note').textContent=s.note;$('#vm').textContent='V_M = '+s.m;$('#vn').textContent='V_N = '+s.n;$('#vmNote').textContent=s.m===s.n?'N と同じ高さ':'P,Q が作る電圧';$('#vnNote').textContent=s.m===s.n?'M と同じ高さ':'p,q が作る電圧';$('#pM').setAttribute('cy',505-s.m*3.75);$('#pN').setAttribute('cy',505-s.n*3.75);$('#txtM').setAttribute('y',510-s.m*3.75);$('#txtM').textContent='M='+s.m;$('#txtN').setAttribute('y',528-s.n*3.75);$('#txtN').textContent='N='+s.n;$('#msg1').textContent=s.msg[0];$('#msg2').textContent=s.msg[1];$$('.dot').forEach((d,i)=>d.classList.toggle('on',i===step));$$('[data-g]').forEach(el=>{const list=(el.dataset.g||'').split(' ');const active=list.includes(s.f)||list.includes('all')||list.includes('voltage');el.classList.toggle('dimmed',!active);el.classList.toggle('bright',active)});$$('.currentPath').forEach(p=>p.classList.remove('on'));(s.paths||[]).forEach(id=>$('#'+id).classList.add('on'));$$('.drop').forEach(p=>p.classList.remove('on'));(s.drops||[]).forEach(id=>$('#'+id).classList.add('on'));$('#resultBox').setAttribute('class',s.result?'show':'hide');$('#play').textContent=playing?'自動 ON':'自動 OFF';$('#play').className=playing?'autoOn':''}
function pointOn(id,u){const p=$('#'+id),len=p.getTotalLength();return p.getPointAtLength(Math.max(0,Math.min(.999,u))*len)}
function move(dot,id,phase,show){const d=$(dot);if(!show){d.style.display='none';return}const local=phase%1;if(local>.86){d.style.display='none';return}d.style.display='block';const pt=pointOn(id,local/.86);d.setAttribute('cx',pt.x);d.setAttribute('cy',pt.y)}
function tick(ts){if(!last)last=ts;const dt=ts-last;last=ts;if(playing){timer+=dt;if(timer>D){timer=0;step=(step+1)%steps.length;render()}}const s=steps[step];const paths=s.paths||[];const ph=(ts/2300)%1;move('#dotMain','mainPath',ph,paths.includes('mainPath'));move('#dotTop','topPath',ph+.25,paths.includes('topPath'));move('#dotAux','auxPath',ph+.45,paths.includes('auxPath'));move('#dotG','gPath',ph+.1,paths.includes('gPath'));move('#dotSrc','sourcePath',ph+.6,paths.includes('sourcePath'));requestAnimationFrame(tick)}
$('#play').onclick=()=>{playing=!playing;timer=0;render()};$('#back').onclick=()=>{step=(step+steps.length-1)%steps.length;timer=0;render()};$('#next').onclick=()=>{step=(step+1)%steps.length;timer=0;render()};render();requestAnimationFrame(tick);
</script>
</body>
</html>
