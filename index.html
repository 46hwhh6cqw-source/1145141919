<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：電圧を追う</title>
<style>
:root{color-scheme:dark;--bg:#05080d;--panel:#071320;--card:#0a1724;--line:#6f8ca8;--dim:#294159;--txt:#f1f8ff;--sub:#a8bacb;--blue:#57a8ff;--cyan:#66e4ff;--green:#78efc4;--yellow:#ffd166;--pink:#ff6b9a;--orange:#ff9f6e;--purple:#c99cff}*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:radial-gradient(900px 580px at 50% -160px,#1e4263,#07111c 58%,#03060b);color:var(--txt);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}.app{max-width:1120px;margin:0 auto;padding:12px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:10px}h1{margin:0;font-size:clamp(22px,6vw,38px);line-height:1.05}.sub{margin:6px 0 0;color:var(--sub);font-size:13px;line-height:1.55}.badge{padding:8px 12px;border:1px solid #33526f;border-radius:999px;background:#081827;color:#b9dbff;font-weight:900;white-space:nowrap}.grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,.85fr);gap:12px}.card{background:rgba(7,17,28,.88);border:1px solid #243d55;border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.34);overflow:hidden}.figure{padding:8px}.side{padding:16px;display:flex;flex-direction:column;gap:12px}.lessonTitle{margin:0;font-size:22px;line-height:1.25}.lead{margin:0;color:#d6e4f0;line-height:1.78;font-size:15px}.track{display:grid;grid-template-columns:1fr 1fr;gap:8px}.trackBox{border:1px solid #2d4c66;background:#071827;border-radius:16px;padding:10px;min-height:76px}.trackBox b{display:block;color:#91caff;font-size:12px;margin-bottom:6px}.trackBox .path{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:900;color:var(--yellow);line-height:1.3}.trackBox .meaning{color:#afc0d1;font-size:12px;line-height:1.55;margin-top:5px}.formula{border:1px solid #3e5871;border-radius:16px;background:#081b2a;min-height:46px;display:flex;align-items:center;justify-content:center;color:var(--yellow);font:900 21px ui-monospace,SFMono-Regular,Menlo,monospace}.formula.empty{font:700 13px system-ui;color:#72879d}ul{margin:0;padding-left:19px;color:#b7c8d8;line-height:1.75;font-size:14px}.controls{display:flex;gap:9px;flex-wrap:wrap;margin-top:auto}button{border:1px solid #31516d;border-radius:14px;background:#0b1b2b;color:#e6f6ff;padding:11px 13px;font-weight:900;min-height:44px;font-size:15px;cursor:pointer}button.primary{background:#1c6dff;border-color:#6aa5ff}button:disabled{opacity:.35}.chips{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:12px}.chip{min-height:42px;font-size:11px;padding:7px 4px;color:#8ca6bc}.chip.on{border-color:var(--green);background:#0e2a2c;color:#dcfff4}.progress{height:7px;border-radius:999px;background:#102133;overflow:hidden;margin-top:12px}.bar{height:100%;width:14.28%;background:linear-gradient(90deg,var(--green),var(--blue),var(--yellow));transition:width .18s ease}.note{color:#8097ae;font-size:12px;line-height:1.55;margin:10px 4px 0}.circuit{width:100%;height:auto;display:block}.wire{fill:none;stroke:var(--line);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.wireDim{fill:none;stroke:var(--dim);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#4a6988;stroke-width:3}.node{fill:#e1f3ff;stroke:#07111b;stroke-width:4}.label{fill:#f5fbff;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px}.small{font-size:21px}.jp{fill:#b9cada;font-weight:850;font-size:18px}.micro{fill:#8fa8bd;font-weight:750;font-size:15px}.high{fill:#ffd166;font-weight:950;font-size:18px}.low{fill:#78efc4;font-weight:950;font-size:18px}.rx{fill:#2d1f18;stroke:#ff9f6e}.rr{fill:#3a1b27;stroke:#ff6b9a}.rs{fill:#182c22;stroke:#78efc4}.aux{fill:#102d39;stroke:#66e4ff}.meter{fill:#1b1230;stroke:#c99cff;stroke-width:4}.source{fill:#102437;stroke:#90c3ff;stroke-width:4}.trace{fill:none;stroke:var(--yellow);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:0;filter:url(#glow)}.trace2{stroke:var(--cyan)}.trace3{stroke:var(--green)}.em{opacity:.18}.on{opacity:1}.dimmed{opacity:.18}.bright{opacity:1;filter:url(#glow)}.hide{opacity:0}.show{opacity:1}.tapLine{stroke:#c99cff;stroke-width:5;stroke-dasharray:8 9;stroke-linecap:round}.voltRail{stroke:#35526c;stroke-width:7;stroke-linecap:round}.voltPoint{fill:#ffd166;stroke:#08111c;stroke-width:4}.voltPointN{fill:#66e4ff;stroke:#08111c;stroke-width:4}.voltText{fill:#d8e8f5;font-weight:900;font-size:16px}.caption{fill:#9fb3c5;font-size:13px;font-weight:750}.call{fill:#06101b;stroke:#31516d;stroke-width:2}.callText{fill:#e6f6ff;font-size:15px;font-weight:850}@media(max-width:850px){.app{padding:9px}.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.side{padding:14px}.chips{grid-template-columns:repeat(2,1fr)}.track{grid-template-columns:1fr}.lead,ul{font-size:14px}.figure{padding:2px}.trackBox .path{font-size:17px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><h1>ケルビンダブルブリッジ</h1><p class="sub">式を先に立てず、電圧の高さを追って読む版。図は固定、強調だけ切り替え。</p></div><div class="badge" id="badge">Step 1 / 7</div></header>
<section class="grid">
<div class="card figure">
<svg viewBox="0 0 940 620" class="circuit" aria-label="Kelvin double bridge voltage tracing diagram">
<defs><filter id="glow" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="bgpanel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#122942"/><stop offset="1" stop-color="#07111c"/></linearGradient></defs>
<rect x="22" y="22" width="896" height="576" rx="28" fill="url(#bgpanel)" stroke="#264158"/>
<text x="70" y="68" class="high">高い電位 H</text><text x="760" y="68" class="low">低い電位 L</text>
<circle cx="104" cy="300" r="36" class="source" data-g="supply"/><text x="104" y="309" text-anchor="middle" class="label">E</text><text x="60" y="352" class="micro">電源</text>
<path d="M140 150 H792 V480 H140" class="wire" data-g="supply all"/><path d="M140 150 V480" class="wireDim"/><path d="M792 150 V480" class="wireDim"/>
<circle cx="140" cy="150" r="7" class="node"/><circle cx="792" cy="150" r="7" class="node"/><circle cx="140" cy="480" r="7" class="node"/><circle cx="792" cy="480" r="7" class="node"/>
<g data-g="top compare balance result"><line x1="250" y1="150" x2="250" y2="480" class="wire"/><rect x="207" y="205" width="86" height="58" rx="14" class="part"/><text x="250" y="243" text-anchor="middle" class="label">P</text><rect x="207" y="365" width="86" height="58" rx="14" class="part"/><text x="250" y="403" text-anchor="middle" class="label">Q</text><circle cx="250" cy="315" r="8" class="node"/><text x="184" y="133" class="jp">比較用の分圧</text></g>
<g data-g="lower r trouble pq balance result"><rect x="344" y="451" width="120" height="58" rx="14" class="part rx"/><text x="404" y="489" text-anchor="middle" class="label">Rx</text><rect x="496" y="451" width="82" height="58" rx="14" class="part rr"/><text x="537" y="489" text-anchor="middle" class="label">r</text><rect x="612" y="451" width="122" height="58" rx="14" class="part rs"/><text x="673" y="489" text-anchor="middle" class="label">Rs</text><text x="404" y="535" text-anchor="middle" class="micro">未知抵抗</text><text x="537" y="535" text-anchor="middle" class="micro">接続抵抗</text><text x="673" y="535" text-anchor="middle" class="micro">標準抵抗</text></g>
<g data-g="pq balance result"><path d="M496 480 C496 350 578 350 578 480" class="wire" stroke="#66e4ff"/><rect x="468" y="330" width="62" height="48" rx="13" class="part aux"/><text x="499" y="362" text-anchor="middle" class="label small">p</text><rect x="544" y="330" width="62" height="48" rx="13" class="part aux"/><text x="575" y="362" text-anchor="middle" class="label small">q</text><circle cx="537" cy="354" r="8" class="node"/><text x="448" y="305" class="jp">r の中の電位を作る</text></g>
<g data-g="balance result"><path d="M250 315 H382 C412 315 412 354 444 354 H537" class="wire" stroke="#c99cff"/><circle cx="398" cy="315" r="30" class="meter"/><text x="398" y="324" text-anchor="middle" class="label">G</text><line x1="250" y1="315" x2="250" y2="565" class="tapLine"/><line x1="537" y1="354" x2="537" y2="565" class="tapLine"/></g>
<g data-g="voltage"><line x1="840" y1="130" x2="840" y2="510" class="voltRail"/><text x="812" y="116" class="high">H</text><text x="812" y="538" class="low">L</text><circle id="pointM" cx="840" cy="300" r="11" class="voltPoint"/><text x="858" y="305" class="voltText">M</text><circle id="pointN" cx="840" cy="300" r="11" class="voltPointN"/><text x="858" y="330" class="voltText">N</text><text x="740" y="584" class="caption">右の縦線は電圧の高さ</text></g>
<path id="tr1" d="M140 150 H250 V315" class="trace"/><path id="tr2" d="M140 480 H496 C496 350 537 350 537 354" class="trace trace2"/><path id="tr3" d="M250 315 H382 C412 315 412 354 537 354" class="trace trace3"/>
<g id="callout" class="hide"><rect x="560" y="188" width="260" height="82" rx="16" class="call"/><text x="690" y="221" text-anchor="middle" class="callText" id="call1">M と N が同じ高さ</text><text x="690" y="249" text-anchor="middle" class="callText" id="call2">G に電流が流れない</text></g>
<g id="resultBox" class="hide"><rect x="572" y="120" width="260" height="78" rx="18" fill="#1b2c42" stroke="#ffd166"/><text x="702" y="151" text-anchor="middle" class="caption">最後に読む式</text><text x="702" y="180" text-anchor="middle" class="label small" fill="#ffd166">Rx = Rs × P/Q</text></g>
</svg>
</div>
<aside class="card side"><h2 class="lessonTitle" id="title"></h2><p class="lead" id="lead"></p><div class="track"><div class="trackBox"><b>追う電圧 1</b><div class="path" id="pathA"></div><div class="meaning" id="meaningA"></div></div><div class="trackBox"><b>追う電圧 2</b><div class="path" id="pathB"></div><div class="meaning" id="meaningB"></div></div></div><div class="formula empty" id="formula"></div><ul id="points"></ul><div class="controls"><button id="first">最初</button><button id="prev">戻る</button><button class="primary" id="next">次へ</button></div></aside>
</section>
<div class="progress"><div class="bar" id="bar"></div></div><nav class="chips" id="chips"></nav><p class="note">ポイント：p,q は r を消す部品ではなく、r の電圧降下の中に「検流計につなぐ電位点 N」を作る部品。</p>
</main>
<script>
const steps=[
{t:'1. 電源は「高さ差」を作る',f:'supply',lead:'まず左側を高い電位 H、右側を低い電位 L と見る。電流はその高さ差で流れる。ここでは抵抗値より先に、どこで電圧が下がるかだけを見る。',a:'H → L',am:'電源が全体の電圧差を作る。',b:'',bm:'',eq:'',pts:['左端は高い電位','右端は低い電位','抵抗を通るたびに電圧が落ちる']},
{t:'2. 下側では Rx, r, Rs で順番に落ちる',f:'lower',lead:'下側の太い電流路を追うと、Rx で落ち、r で少し落ち、Rs で落ちる。低抵抗測定では、この r の落ち方が無視できない。',a:'H → Rx → r → Rs → L',am:'下側の電圧降下の流れ。',b:'ΔVx, ΔVr, ΔVs',bm:'r にも電圧降下がある。',eq:'',pts:['Rx だけを見たい','でも r にも電圧が落ちる','普通に測ると r が混ざる']},
{t:'3. r が邪魔になる理由',f:'trouble',lead:'Rx と Rs の間に r の電圧降下があるので、どの点を検流計につなぐかで見える電位が変わる。だから単純なブリッジでは低抵抗に弱い。',a:'Rx 側の端 → r → Rs 側の端',am:'r の両端で電位が違う。',b:'N がどこかで結果が変わる',bm:'検流計の接続点が重要になる。',eq:'',pts:['r の両端は同じ電位ではない','接続点を雑に選ぶと r を拾う','だから r の中の電位を作る必要がある']},
{t:'4. p,q は r の中に電位点 N を作る',f:'pq',lead:'p,q は r と直列に足すものではない。r の両端をまたいで、r の電圧降下の途中に N という電位点を作る。',a:'Rx 側 → p → N',am:'r の電圧降下の上側を選ぶ。',b:'N → q → Rs 側',bm:'r の電圧降下の下側を選ぶ。',eq:'',pts:['N は r の途中の電位として扱える','p,q の比で N の高さが決まる','r を物理的に消しているわけではない']},
{t:'5. P,Q は比較用の電位点 M を作る',f:'top',lead:'上側の P,Q も同じように、全体の電圧差の途中に M という電位点を作る。ここで M と N の高さを比べる。',a:'H → P → M',am:'P を通って M まで下がる。',b:'M → Q → L',bm:'M から Q を通って L まで下がる。',eq:'',pts:['P,Q は比較用の分圧器','M の高さは P,Q の比で決まる','下側の N と同じ高さにできるかを見る']},
{t:'6. G=0 は M と N が同じ高さ',f:'balance',lead:'検流計 G に電流が流れないとき、M と N は同じ電位。つまり「上側で作った高さ」と「r の途中で作った高さ」が一致している。',a:'V_M = V_N',am:'G の左右に電圧差がない。',b:'I_G = 0',bm:'検流計には電流が流れない。',eq:'V_M = V_N',pts:['G=0 は電位差ゼロの合図','M と N が同じ高さになるように調整する','ここで初めて左右を比較できる']},
{t:'7. 比をそろえると r の落ち方だけが消える',f:'result',lead:'P,Q の比と p,q の比をそろえると、r の電圧降下を同じ割合で上下に分けて見ることになる。そのため比較から r の影響だけが外れ、Rx と Rs の関係が残る。',a:'P/Q = p/q',am:'上側の分け方と r の分け方をそろえる。',b:'Rx ↔ Rs',bm:'最後に未知抵抗と標準抵抗だけを比べられる。',eq:'Rx = Rs × P/Q',pts:['r は消えるのではなく、同じ割合で拾われる','同じ割合で拾うから比較式から外れる','最後だけ式で読む']}
];
let i=0;const $=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));const chips=$('#chips');steps.forEach((s,k)=>{const b=document.createElement('button');b.className='chip';b.textContent=s.t;b.onclick=()=>{i=k;render()};chips.appendChild(b)});
function onGroup(name){$$('[data-g]').forEach(el=>{const g=(el.dataset.g||'').split(' ');const active=name==='all'||g.includes(name)||g.includes('all');el.classList.toggle('dimmed',!active);el.classList.toggle('bright',active)});}
function render(){const s=steps[i];$('#badge').textContent='Step '+(i+1)+' / '+steps.length;$('#title').textContent=s.t;$('#lead').textContent=s.lead;$('#pathA').textContent=s.a||'—';$('#meaningA').textContent=s.am||'';$('#pathB').textContent=s.b||'—';$('#meaningB').textContent=s.bm||'';$('#formula').textContent=s.eq||'式は最後まで主役にしない';$('#formula').className=s.eq?'formula':'formula empty';$('#points').innerHTML=s.pts.map(x=>'<li>'+x+'</li>').join('');$('#bar').style.width=((i+1)/steps.length*100)+'%';$$('.chip').forEach((b,k)=>b.classList.toggle('on',k===i));onGroup(s.f);$('#tr1').classList.toggle('on',['top','balance','result'].includes(s.f));$('#tr2').classList.toggle('on',['pq','balance','result'].includes(s.f));$('#tr3').classList.toggle('on',['balance'].includes(s.f));$('#callout').className=s.f==='balance'?'show':'hide';$('#resultBox').className=s.f==='result'?'show':'hide';$('#pointM').setAttribute('cy',s.f==='balance'||s.f==='result'?300:260);$('#pointN').setAttribute('cy',s.f==='balance'||s.f==='result'?300:345);$('#prev').disabled=i===0;$('#next').disabled=i===steps.length-1;}
$('#first').onclick=()=>{i=0;render()};$('#prev').onclick=()=>{i=Math.max(0,i-1);render()};$('#next').onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script>
</body>
</html>
