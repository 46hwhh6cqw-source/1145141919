<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：電流と電圧</title>
<style>
:root{color-scheme:dark;--bg:#05080d;--card:#081522;--line:#6f8ca8;--dim:#263b50;--txt:#eff8ff;--sub:#a7bacb;--main:#ffd166;--top:#58a8ff;--aux:#66e5ff;--gal:#c99cff;--ok:#78efc4;--bad:#ff6b8a;--rx:#ff9f6e}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(900px 520px at 50% -160px,#1e4568,#07111c 58%,#03060b);color:var(--txt);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}body{overflow-y:auto;-webkit-overflow-scrolling:touch}.app{max-width:1180px;margin:0 auto;padding:8px 8px 22px}.top{position:sticky;top:0;z-index:20;background:linear-gradient(#07111c 75%,rgba(7,17,28,.72));backdrop-filter:blur(8px);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0 8px}h1{font-size:clamp(18px,4.6vw,30px);line-height:1.05;margin:0}.sub{font-size:12px;color:var(--sub);margin:4px 0 0}.ctrl{display:flex;gap:6px}button{border:1px solid #31516d;border-radius:12px;background:#0b1b2b;color:#e8f6ff;padding:9px 10px;font-weight:900;min-height:38px;font-size:13px;cursor:pointer;white-space:nowrap}.primary{background:#1c6dff;border-color:#6aa5ff}.autoOn{background:#0d2d2a;border-color:#62e0be;color:#dcfff6}.stage{display:grid;grid-template-columns:minmax(0,1.42fr) minmax(300px,.82fr);gap:9px}.card{background:rgba(7,17,28,.92);border:1px solid #243d55;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}.fig{min-height:0}.fig svg{width:100%;height:auto;display:block}.side{padding:12px;display:grid;gap:9px;align-content:start}.stepbar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dot{height:8px;min-height:8px;border-radius:99px;background:#183047;border:0;padding:0}.dot.on{background:linear-gradient(90deg,var(--ok),var(--top),var(--main))}.stepTitle{margin:0;font-size:20px;line-height:1.25}.lead{margin:0;color:#d7e6f2;line-height:1.58;font-size:14px}.meters{display:grid;grid-template-columns:1fr 1fr;gap:7px}.meterBox{background:#071827;border:1px solid #2d4c66;border-radius:14px;padding:8px}.meterBox b{display:block;font-size:11px;color:#91caff;margin-bottom:4px}.meterBox .v{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:19px;font-weight:950;color:var(--main)}.meterBox .m{font-size:11px;color:#aebfce;line-height:1.35;margin-top:2px}.note{font-size:13px;color:#b8c9d8;line-height:1.58;margin:0}.legend{display:flex;gap:6px;flex-wrap:wrap;color:#94aabc;font-size:11px}.pill{border:1px solid #2e4b64;border-radius:999px;padding:4px 7px;background:#081929}.bg{fill:#081522;stroke:#244056}.wire{fill:none;stroke:var(--line);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#496982;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#4a6988;stroke-width:3}.rx{fill:#2d1f18;stroke:var(--rx)}.rr{fill:#3a1b27;stroke:var(--bad)}.rs{fill:#182c22;stroke:var(--ok)}.aux{fill:#102d39;stroke:var(--aux)}.source{fill:#102437;stroke:#90c3ff;stroke-width:4}.meterG{fill:#1b1230;stroke:var(--gal);stroke-width:4}.node{fill:#e1f3ff;stroke:#07111b;stroke-width:4}.label{fill:#f5fbff;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:26px}.labelS{font-size:20px}.jp{fill:#b9cada;font-weight:850;font-size:15px}.micro{fill:#94a9bb;font-weight:750;font-size:13px}.vtxt{fill:#e9f6ff;font-weight:900;font-size:14px}.path{fill:none;stroke:var(--main);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.13}.path.on{opacity:.92;filter:url(#glow)}.pTop{stroke:var(--top)}.pAux{stroke:var(--aux)}.pG{stroke:var(--gal)}.pSrc{stroke:#a0a8b0;stroke-width:6;stroke-dasharray:10 10}.drop{fill:none;stroke:var(--main);stroke-width:6;stroke-dasharray:10 10;stroke-linecap:round;opacity:0}.drop.on{opacity:.85}.dim{opacity:.23}.bright{opacity:1;filter:url(#glow)}.hide{opacity:0}.show{opacity:1}.particle{fill:#fff3a8;stroke:#ff9f1c;stroke-width:3;filter:url(#glow)}.ptop{fill:#b8dcff;stroke:#58a8ff}.paux{fill:#a8f6ff;stroke:#30d4ff}.pg{fill:#e9ceff;stroke:#c99cff}.psrc{fill:#dfe4ea;stroke:#929aa4}.rail{stroke:#36536d;stroke-width:7;stroke-linecap:round}.vm{fill:var(--main);stroke:#08111c;stroke-width:4}.vn{fill:var(--aux);stroke:#08111c;stroke-width:4}.call{fill:#06101b;stroke:#31516d;stroke-width:2}.callText{fill:#e8f6ff;font-size:14px;font-weight:850}@media(max-width:850px){.app{padding:7px 7px 24px}.top{grid-template-columns:1fr;padding-top:4px}.ctrl{display:grid;grid-template-columns:1fr 1fr 1fr}.ctrl button{padding:8px 6px;font-size:12px}.stage{display:block}.fig{height:58svh;margin-bottom:8px}.fig svg{height:100%;width:100%}.side{margin-top:8px}.stepTitle{font-size:17px}.lead{font-size:13px;line-height:1.5}.meters{grid-template-columns:1fr 1fr}.meterBox .v{font-size:16px}.note{font-size:12px;line-height:1.5}.legend{display:none}.sub{font-size:11px}.dot{height:7px;min-height:7px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
  <div><h1>ケルビンダブルブリッジ</h1><p class="sub">画面は縦スクロール可。外部回路は A → D、D → A は電源内部だけ。</p></div>
  <div class="ctrl"><button id="back">戻る</button><button id="play" class="autoOn">自動 ON</button><button id="next" class="primary">次へ</button></div>
</header>
<section class="stage">
<div class="card fig">
<svg viewBox="0 0 900 560" aria-label="正しい電流経路のケルビンダブルブリッジ">
<defs><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect x="14" y="14" width="872" height="532" rx="26" class="bg"/>
<text x="78" y="56" class="jp">A 高電位</text><text x="720" y="56" class="jp">D 低電位</text>
<circle cx="110" cy="470" r="32" class="source" data-g="source"/><text x="110" y="479" text-anchor="middle" class="label">E</text><text x="43" y="520" class="micro">電源内部で D → A</text>
<path d="M760 370 V470 H142 V370 H120" class="thin pSrc" data-g="source"/>
<path d="M120 370 V135 H205" class="wire" data-g="all source top"/><path d="M760 370 V135 H690" class="wire" data-g="all source top"/>
<circle cx="120" cy="370" r="8" class="node"/><circle cx="760" cy="370" r="8" class="node"/><text x="106" y="400" class="vtxt">A=100</text><text x="736" y="400" class="vtxt">D=0</text>
<g data-g="main result"><path d="M120 370 H270" class="wire"/><rect x="270" y="341" width="115" height="58" rx="14" class="part rx"/><text x="328" y="379" text-anchor="middle" class="label">Rx</text><path d="M385 370 H435" class="wire"/><circle cx="435" cy="370" r="8" class="node"/><text x="414" y="402" class="vtxt">B=70</text><rect x="470" y="341" width="86" height="58" rx="14" class="part rr"/><text x="513" y="379" text-anchor="middle" class="label">r</text><path d="M556 370 H590" class="wire"/><circle cx="590" cy="370" r="8" class="node"/><text x="570" y="402" class="vtxt">C=62</text><rect x="625" y="341" width="115" height="58" rx="14" class="part rs"/><text x="683" y="379" text-anchor="middle" class="label">Rs</text><path d="M740 370 H760" class="wire"/><text x="296" y="425" class="micro">未知抵抗</text><text x="478" y="425" class="micro">接続抵抗</text><text x="654" y="425" class="micro">標準抵抗</text></g>
<g data-g="aux balance result"><path d="M435 370 V270 H465" class="wire" stroke="#66e5ff"/><rect x="465" y="241" width="66" height="56" rx="13" class="part aux"/><text x="498" y="278" text-anchor="middle" class="label labelS">p</text><circle cx="560" cy="270" r="8" class="node"/><text x="547" y="254" class="vtxt">N</text><rect x="590" y="241" width="66" height="56" rx="13" class="part aux"/><text x="623" y="278" text-anchor="middle" class="label labelS">q</text><path d="M656 270 H685 V370 H590" class="wire" stroke="#66e5ff"/><text x="463" y="225" class="jp">p,q は B → C</text></g>
<g data-g="top balance result"><path d="M205 135 H240" class="wire"/><rect x="240" y="106" width="90" height="58" rx="14" class="part"/><text x="285" y="144" text-anchor="middle" class="label">P</text><path d="M330 135 H410" class="wire"/><circle cx="410" cy="135" r="8" class="node"/><text x="396" y="120" class="vtxt">M</text><path d="M410 135 H505" class="wire"/><rect x="505" y="106" width="90" height="58" rx="14" class="part"/><text x="550" y="144" text-anchor="middle" class="label">Q</text><path d="M595 135 H690" class="wire"/><text x="297" y="88" class="jp">P,Q は A → D</text></g>
<g data-g="gal balance result"><path d="M410 135 C455 180 505 225 560 270" class="wire" stroke="#c99cff"/><circle cx="486" cy="205" r="29" class="meterG"/><text x="486" y="214" text-anchor="middle" class="label">G</text></g>
<path id="mainPath" d="M120 370 H270 H385 H435 H470 H556 H590 H625 H740 H760" class="path"/>
<path id="topPath" d="M120 370 V135 H240 H330 H410 H505 H595 H760 V370" class="path pTop"/>
<path id="auxPath" d="M435 370 V270 H465 H531 H560 H590 H656 H685 V370 H590" class="path pAux"/>
<path id="gPath" d="M410 135 C455 180 505 225 560 270" class="path pG"/>
<path id="sourcePath" d="M760 370 V470 H142 V370 H120" class="path pSrc"/>
<path id="dropRx" d="M328 330 V285" class="drop"/><path id="dropR" d="M513 330 V285" class="drop"/><path id="dropRs" d="M683 330 V285" class="drop"/>
<g data-g="voltage"><line x1="810" y1="90" x2="810" y2="455" class="rail"/><text x="780" y="83" class="vtxt">100</text><text x="792" y="485" class="vtxt">0</text><circle id="pM" cx="810" cy="220" r="10" class="vm"/><text id="txtM" x="827" y="225" class="vtxt">M=66</text><circle id="pN" cx="810" cy="232" r="10" class="vn"/><text id="txtN" x="827" y="250" class="vtxt">N=63</text><text x="745" y="528" class="micro">電圧の高さ</text></g>
<g><rect x="46" y="78" width="250" height="68" rx="15" class="call"/><text id="msg1" x="171" y="106" text-anchor="middle" class="callText">外部回路は A → D</text><text id="msg2" x="171" y="132" text-anchor="middle" class="callText">D → A は電源内部だけ</text></g>
<g id="resultBox" class="hide"><rect x="590" y="80" width="245" height="68" rx="15" fill="#17283d" stroke="#ffd166"/><text x="713" y="108" text-anchor="middle" class="micro">平衡後</text><text x="713" y="136" text-anchor="middle" class="label labelS" fill="#ffd166">Rx = Rs × P/Q</text></g>
<circle id="dotMain" r="8" class="particle"/><circle id="dotTop" r="7" class="particle ptop"/><circle id="dotAux" r="7" class="particle paux"/><circle id="dotG" r="7" class="particle pg"/><circle id="dotSrc" r="6" class="particle psrc"/>
</svg>
</div>
<aside class="card side">
  <div class="stepbar" id="dots"></div>
  <h2 class="stepTitle" id="title"></h2>
  <p class="lead" id="lead"></p>
  <div class="meters"><div class="meterBox"><b>比較点 M</b><div class="v" id="vm">V_M = 66</div><div class="m" id="vmNote">P,Q が作る電圧</div></div><div class="meterBox"><b>r 側の点 N</b><div class="v" id="vn">V_N = 63</div><div class="m" id="vnNote">p,q が作る電圧</div></div></div>
  <p class="note" id="note"></p>
  <div class="legend"><span class="pill">黄：A→Rx→r→Rs→D</span><span class="pill">青：A→P→Q→D</span><span class="pill">水：B→p→q→C</span><span class="pill">紫：M↔N</span></div>
</aside>
</section>
</main>
<script>
const steps=[
{f:'source',t:'1. 外部回路は A から D へ',lead:'電源は A を高電位、D を低電位にする。外部の測定回路では電流は A から D へ進む。D から A へ戻すのは電源内部だけ。',note:'ページは縦スクロールできます。図の下に解説カードがあります。',m:66,n:63,msg:['外部回路は A → D','D → A は電源内部だけ'],paths:['sourcePath']},
{f:'main',t:'2. 主電流は Rx, r, Rs を一方向に通る',lead:'主電流は A → Rx → B → r → C → Rs → D。r は B と C の間にあるので、r にも電圧降下が出る。',note:'黄色の粒は左から右へ流れ、同じ枝を逆戻りしない。',m:66,n:63,msg:['主電流は A → D','Rx, r, Rs で電圧降下'],paths:['mainPath'],drops:['dropRx','dropR','dropRs']},
{f:'aux',t:'3. p,q の電流は B から C へ流れる',lead:'p,q は r の両端 B,C をまたぐ枝。電流は B → p → N → q → C と流れて、C 側で主枝に合流する。',note:'p,q は閉じた輪ではない。r と並列に、B から C へ通る補助枝として見る。',m:66,n:63,msg:['p,q は B → C','N は r の途中電位'],paths:['mainPath','auxPath'],drops:['dropR']},
{f:'top',t:'4. P,Q の電流は A から D へ流れる',lead:'P,Q も電源につながる別の枝。A → P → M → Q → D と流れ、M という比較用の電位を作る。',note:'M は P,Q で作る電位。N は p,q で作る電位。この2つを比べる。',m:66,n:63,msg:['P,Q は A → D','M と N を比べる'],paths:['mainPath','topPath','auxPath']},
{f:'gal',t:'5. M と N がずれると G に電流が流れる',lead:'M と N の電位が違うと、検流計 G に電圧がかかる。だから紫の電流が M から N へ流れる。',note:'これは未平衡。G に電流が流れるので、まだ測定値として使わない。',m:66,n:63,msg:['V_M ≠ V_N','G に電流が流れる'],paths:['mainPath','topPath','auxPath','gPath']},
{f:'balance',t:'6. 調整して M と N を同じ高さにする',lead:'p,q と P,Q の比をそろえると、N の高さと M の高さを一致させられる。すると G の両端に電圧差がなくなる。',note:'平衡状態では G に電流が流れない。ここで初めて比較が成立する。',m:66,n:66,msg:['V_M = V_N','G 電流は 0'],paths:['mainPath','topPath','auxPath']},
{f:'result',t:'7. 最後に r の影響が比較から外れる',lead:'r の電圧降下を p,q で同じ割合に分けて見ているので、平衡条件から r の影響だけが外れる。最後に Rx と Rs の関係が残る。',note:'結論だけ式で読む。主役は M と N の電圧合わせ。',m:66,n:66,msg:['P/Q = p/q','Rx = Rs × P/Q'],paths:['mainPath','topPath','auxPath'],result:true}
];
let step=0,playing=true,last=0,timer=0;const D=5600,$=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));steps.forEach((_,i)=>{const b=document.createElement('button');b.className='dot';b.onclick=()=>{step=i;timer=0;render()};$('#dots').appendChild(b)});
function render(){const s=steps[step];$('#title').textContent=s.t;$('#lead').textContent=s.lead;$('#note').textContent=s.note;$('#vm').textContent='V_M = '+s.m;$('#vn').textContent='V_N = '+s.n;$('#vmNote').textContent=s.m===s.n?'N と同じ高さ':'P,Q が作る電圧';$('#vnNote').textContent=s.m===s.n?'M と同じ高さ':'p,q が作る電圧';$('#pM').setAttribute('cy',455-s.m*3.65);$('#pN').setAttribute('cy',455-s.n*3.65);$('#txtM').setAttribute('y',460-s.m*3.65);$('#txtM').textContent='M='+s.m;$('#txtN').setAttribute('y',478-s.n*3.65);$('#txtN').textContent='N='+s.n;$('#msg1').textContent=s.msg[0];$('#msg2').textContent=s.msg[1];$$('.dot').forEach((d,i)=>d.classList.toggle('on',i===step));$$('[data-g]').forEach(el=>{const list=(el.dataset.g||'').split(' ');const active=list.includes(s.f)||list.includes('all')||list.includes('voltage');el.classList.toggle('dim',!active);el.classList.toggle('bright',active)});$$('.path').forEach(p=>p.classList.remove('on'));(s.paths||[]).forEach(id=>$('#'+id).classList.add('on'));$$('.drop').forEach(p=>p.classList.remove('on'));(s.drops||[]).forEach(id=>$('#'+id).classList.add('on'));$('#resultBox').setAttribute('class',s.result?'show':'hide');$('#play').textContent=playing?'自動 ON':'自動 OFF';$('#play').className=playing?'autoOn':''}
function point(id,u){const p=$('#'+id),len=p.getTotalLength();return p.getPointAtLength(Math.max(0,Math.min(.999,u))*len)}
function move(dot,id,phase,show){const d=$(dot);if(!show){d.style.display='none';return}const local=phase%1;if(local>.86){d.style.display='none';return}d.style.display='block';const pt=point(id,local/.86);d.setAttribute('cx',pt.x);d.setAttribute('cy',pt.y)}
function tick(ts){if(!last)last=ts;const dt=ts-last;last=ts;if(playing){timer+=dt;if(timer>D){timer=0;step=(step+1)%steps.length;render()}}const s=steps[step],p=s.paths||[],ph=(ts/2300)%1;move('#dotMain','mainPath',ph,p.includes('mainPath'));move('#dotTop','topPath',ph+.25,p.includes('topPath'));move('#dotAux','auxPath',ph+.45,p.includes('auxPath'));move('#dotG','gPath',ph+.1,p.includes('gPath'));move('#dotSrc','sourcePath',ph+.6,p.includes('sourcePath'));requestAnimationFrame(tick)}
$('#play').onclick=()=>{playing=!playing;timer=0;render()};$('#back').onclick=()=>{step=(step+steps.length-1)%steps.length;timer=0;render()};$('#next').onclick=()=>{step=(step+1)%steps.length;timer=0;render()};render();requestAnimationFrame(tick);
</script>
</body>
</html>
